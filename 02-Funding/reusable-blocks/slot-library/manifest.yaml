# -----------------------------------------------------------------------------
# Funder kind registry (added in v1.1)
# -----------------------------------------------------------------------------
# Determines which slot subset a funder needs. heavy = full U01-U22 + A01-A05;
# medium = subset; light = minimal A01 + A03 + a few F-family.
funder_kinds:
  universal_baseline:
    description: The Heilmeier reference; not a real funder.
    canonical_subset: heavy
  federal_grant:
    description: Federal grant under FAR (NIH, NSF traditional, DOE conventional).
    canonical_subset: heavy
  federal_OT:
    description: Federal Other Transaction contract or Mission Office ISO (ARPA-H ISOs, NSF Tech Labs OT, DOE Genesis if structured as OT). Adds research-security and phased-budget specifics.
    canonical_subset: heavy
  intergovernmental_grant:
    description: Multilateral / intergovernmental program (Horizon Europe, UNESCO, WHO).
    canonical_subset: heavy
  private_grant:
    description: Single-grant philanthropic award (Google.org, Schmidt Sciences, Wellcome Trust).
    canonical_subset: heavy
  philanthropic_grant_proactive:
    description: Funder primarily reaches out (Coefficient Giving, Wellcome Leap thrusts).
    canonical_subset: heavy
  ea_micro_grant:
    description: Effective-altruism micro-grant funders with counterfactual emphasis (EA LTFF, EAIF, Emergent Ventures).
    canonical_subset: medium
  private_fellowship:
    description: Residency/fellowship structures (Astera, Brains, Foresight, Schmidt postdocs).
    canonical_subset: heavy
  accelerator:
    description: Cohort-based accelerator/incubator (YC, IndieBio, JLABS, Bakar Labs, SkyDeck, Fast Forward).
    canonical_subset: medium
  vc_investment:
    description: Venture-capital investment (Lux, BEV, 5050 Fellowship, Anthology Fund, IndieBio).
    canonical_subset: medium
  venture_builder:
    description: Operator-building model (Deep Science Ventures, Foresite Labs, The Next Sequence).
    canonical_subset: medium
  corporate_credit:
    description: Cloud / API / software credits, often programmatically issued (AWS Activate, Google Cloud AI Startup, Anthropic AI for Science, NVIDIA Inception, Microsoft for Startups).
    canonical_subset: light
  nonprofit_discount:
    description: Free / discounted SaaS or hardware for verified 501(c)(3)s, mostly TechSoup-mediated (Canva, Zoom, Slack, Adobe, GitHub, Notion, etc.).
    canonical_subset: light

# -----------------------------------------------------------------------------
# Funder metadata fields (F-family) — added in v1.1
# -----------------------------------------------------------------------------
# These describe the funding opportunity itself, not proposal content.
# They live on the funder file (funder_metadata: {...}) and on the Monday
# Funding Opportunities board as columns. F01–F11 map to existing Monday
# columns; F12–F30 are new and proposed for the next Monday board pass.
funder_metadata_fields:
  F01:
    name: funding_category
    type: enum
    monday_column_id: color_mm2baevc
    values: [Grants, Small Grants, Accelerators & Incubators, Credits, Discounts, Investment]
    existing: true
  F02:
    name: maturity_stage
    type: enum
    monday_column_id: color_mm2b9yqc
    values: [Early, Intermediate, Late]
    existing: true
  F03:
    name: pipeline_status
    type: enum
    monday_column_id: color_mm2b37zy
    values: [Not Started, Under Consideration, Under Preparation, Internal Review, Applied, Approved / Granted, Rejected, Archived]
    existing: true
  F04:
    name: funding_source_type
    type: enum
    monday_column_id: color_mm2b9xc9
    values: [Government, Philanthropic Foundation, FRO / Moonshot, Corporate, Venture Capital, EA / Longtermist, Intergovernmental, Nonprofit Program]
    existing: true
  F05:
    name: funding_type
    type: text
    monday_column_id: text_mm2bn127
    existing: true
  F06:
    name: funding_subtype
    type: text
    monday_column_id: text_mm2b5229
    existing: true
  F07:
    name: focus_areas
    type: dropdown_multi
    monday_column_id: dropdown_mm2by651
    existing: true
  F08:
    name: deadline
    type: date
    monday_column_id: date_mm2bqn02
    existing: true
  F09:
    name: deadline_type
    type: enum
    monday_column_id: color_mm2byfy9
    values: [Single Deadline, Recurring Annual, Ongoing / Rolling]
    existing: true
  F10:
    name: mission_alignment
    type: rating_0_5
    monday_column_id: rating_mm2bbgnv
    existing: true
  F11:
    name: initial_submission_format
    type: text
    monday_column_id: text_mm2bpm46
    existing: true
  F12:
    name: instrument
    type: enum
    values: [grant, investment, credits, discount, in-kind, fellowship, hybrid, TBD-at-closing]
    default: grant
    added_in: "1.1"
  F13:
    name: submission_stages
    type: list
    values_examples: [[full], [LOI, full], [concept, full], [abstract, full], [summary, full], [round1, round2], [invitation_only]]
    default: [full]
    added_in: "1.1"
  F14:
    name: application_effort
    type: enum
    values: [light, medium, heavy]
    description: light=≤2h, medium=≤20h, heavy=>20h
    default: medium
    added_in: "1.1"
  F15:
    name: investment_horizon_years
    type: int
    description: Patient-capital horizon for VC/venture-builder; null otherwise
    default: null
    added_in: "1.1"
  F16:
    name: application_required
    type: enum
    values: [yes, verification_only, no, invitation_only]
    default: yes
    added_in: "1.1"
  F17:
    name: cost_share_required
    type: bool_or_percent
    default: false
    added_in: "1.1"
  F18:
    name: indirect_cost_rule
    type: enum
    values: [flat_15pct, flat_10pct, flat_25pct, capped_negotiated, fEC, F&A_negotiated, OT_negotiated, direct_only, uncapped]
    default: F&A_negotiated
    added_in: "1.1"
  F19:
    name: award_period_months
    type: int
    default: null
    added_in: "1.1"
  F20:
    name: joint_program_partners
    type: list
    description: List of partner-org names for joint programs
    default: []
    added_in: "1.1"
  F21:
    name: funder_process_type
    type: enum
    values: [proactive, reactive, hybrid]
    description: Does the funder reach out (proactive) or accept open applications (reactive)?
    default: reactive
    added_in: "1.1"
  F22:
    name: canonical_funder_ref
    type: string
    description: Reference to canonical/funders/<funder_id>.yaml when one exists
    default: null
    added_in: "1.1"
  F23:
    name: min_award_usd
    type: numeric
    monday_column_id: numeric_mm2bddjd
    default: 0
    existing_partial: true
    added_in: "1.1"
  F24:
    name: max_award_usd
    type: numeric
    monday_column_id: numeric_mm2bw7ds
    default: null
    existing_partial: true
    added_in: "1.1"
  F25:
    name: residency_required
    type: bool
    default: false
    added_in: "1.1"
  F26:
    name: residency_location
    type: string
    description: City/region required for in-person residency (e.g., SF/Berlin/Emeryville)
    default: null
    added_in: "1.1"
  F27:
    name: confidentiality_policy
    type: enum
    values: [standard, no_confidential_ip, nda_required]
    default: standard
    added_in: "1.1"
  F28:
    name: written_feedback_gate
    type: bool
    description: Funder requires written feedback round before accepting full proposal (e.g., ARPA-H)
    default: false
    added_in: "1.1"
  F29:
    name: review_criteria
    type: list
    description: Structured criteria with weights, when published
    default: []
    added_in: "1.1"
  F30:
    name: required_partners_count
    type: int
    description: For consortia (e.g., Horizon Europe min 3 from 3 different EU countries)
    default: 0
    added_in: "1.1"
  F31:
    name: strategic_connection
    type: list_of_objects
    schema:
      - name: string
      - role: string
      - relationship: string
      - notes: string
    description: |
      Insider connections (Cytognosis-side) that meaningfully shape access or
      review pathway (e.g., Adam Marblestone @ Convergent Research, Milad
      Alucozai @ ARPA-H, Angela Pisco @ CZI, Shankar Subramaniam @ Wellcome
      Leap). Discovered in Drive funding-research summary.
    default: []
    added_in: "1.2"
  F32:
    name: strategic_pairing
    type: list_of_strings
    description: |
      Other opportunity IDs that this opportunity is strategically paired with
      (e.g., NSF Tech Labs paired with Convergent Research FRO; ARPA-H ISO
      paired with Delphi as biosensor companion).
    default: []
    added_in: "1.2"
  F33:
    name: thematic_tags
    type: list_of_strings
    description: |
      Hashtag-style cross-cutting tags from the Drive funding taxonomy
      (#Moonshot, #FRO, #Open, #Cytoscope, #Cytoverse, #Cytonome, #Proactive,
      #Healthspan, #Neuro, #AI, #Biotech, #ImpactCenter, #Equity, etc.).
      Distinct from F07 focus_areas (which is a fixed enum); thematic_tags
      are flexible and program-specific.
    default: []
    added_in: "1.2"
  F34:
    name: sub_programs
    type: list_of_objects
    schema:
      - id: string
      - name: string
      - url: string
      - relationship: string  # one of: child | companion | predecessor | successor
    description: |
      Programs within or related to this opportunity (e.g., ARPA-H Mission
      Office ISO has child Programs DELPHI, PROSPR, EVIDENT; NIH Common Fund
      has children Bridge2AI, PRIMED-AI). Lets us link tracking of program
      announcements to the parent opportunity.
    default: []
    added_in: "1.2"
  F35:
    name: heilmeier_required
    type: bool
    description: |
      Funder explicitly requires (or strongly favors) addressing the Heilmeier
      Catechism in the initial submission (e.g., ARPA-H 5-page Solution
      Summary, NSF Tech Labs RFI). Drives template-selection in render.
    default: false
    added_in: "1.2"
  F36:
    name: review_mechanism
    type: enum
    values: [peer_review, program_officer, internal_panel, invitation_only,
             expert_committee, dual_anonymous, hybrid]
    description: |
      How submissions are reviewed (NIH peer review vs ARPA-H program-officer
      vs YC partner panel vs Schmidt invitation-only).
    default: peer_review
    added_in: "1.2"
  F37:
    name: academic_affiliation_required
    type: bool
    description: |
      Funder requires PI to hold an academic appointment (NIH R01 default,
      NSF default, some philanthropic LOIs). Distinct from residency
      requirements (F25) and from US-entity requirements (F25/F26).
    default: false
    added_in: "1.2"
  F38:
    name: funding_score_rationale
    type: text
    description: |
      Free-text explanation behind the F10 mission_alignment score
      (1-2 sentences). Captures "why we rate this 9/10 — perfect FRO fit
      plus direct CEO connection." Surfaces in Monday hover.
    default: null
    added_in: "1.2"

# -----------------------------------------------------------------------------
# Render defaults
# -----------------------------------------------------------------------------
length_enforcement:
  strategy: funder_first            # funder limit overrides slot author-limit at render
  on_overflow: warn                 # warn | truncate | fail
  overflow_message_template: "[overflow: {actual} > {limit} {unit}] slot {slot_id} in {funder}.{artifact}.{section}"

render_targets:
  primary: google_workspace
  targets:
    google_workspace:
      kind: api
      tool: google_workspace_connector
      surfaces: [docs, sheets, slides]
      notes: Primary output. Use Google Docs/Sheets/Slides APIs via the google-workspace skill.
    docxtpl:
      kind: local_file
      tool: docxtpl
      notes: Used only when funder requires a specific DOCX file with their template.
    openpyxl_jinja:
      kind: local_file
      tool: openpyxl + Jinja + LibreOffice recalc.py
      notes: Used only when funder requires a specific XLSX budget template.
    quarto:
      kind: local_file
      tool: quarto
      notes: Internal review PDFs and Markdown renders.

# -----------------------------------------------------------------------------
# Validation rules
# -----------------------------------------------------------------------------
validation:
  require_all_slot_files: true
  require_all_funder_files: true
  require_sub_slot_heading_match: true
  require_funder_hooks_resolve: true
  strict_id_format:
    slot_id: ^(U\d{2}|A\d{2})$
    sub_slot_id: ^(U\d{2}|A\d{2})\.[1-9][0-9]?$
    funder_question: ^[a-z_]+\.(Q[0-9a-z]+|[A-Z]+[0-9a-z.]+|appendix_[a-z]_[0-9]+|[a-z_]+)$
    funder_metadata_id: ^F\d{2}$
