<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" font-family="Inter, 'DejaVu Sans', Arial, sans-serif">
  <defs>
    <radialGradient id="disc" cx="50%" cy="38%" r="60%"><stop offset="0%" stop-color="#E7F7FB"/><stop offset="64%" stop-color="#F3FAFD"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1F7E91"/><stop offset="55%" stop-color="#45C3DD"/><stop offset="100%" stop-color="#8B3FC7"/></linearGradient>
    <filter id="ndsh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#13314a" flood-opacity="0.16"/></filter>
    <marker id="ahT" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1F7E91"/></marker>
    <marker id="ahTs" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 Z" fill="#1F7E91"/></marker>
  </defs>

  <rect width="600" height="600" fill="#FFFFFF"/>
  <rect x="1" y="1" width="598" height="598" fill="none" stroke="#E6EDF3" stroke-width="2"/>
  <rect width="600" height="10" fill="url(#topbar)"/>
  <circle cx="300" cy="208" r="200" fill="url(#disc)"/>

  <rect x="40" y="40" width="116" height="46" rx="23" fill="#2C9DB5"/>
  <text x="98" y="71" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="700" letter-spacing="1.5">TA 2</text>

  <!-- researcher (human in the loop) -->
  <circle cx="300" cy="78" r="11" fill="#16385B"/>
  <path d="M284,104 q0,-21 16,-21 q16,0 16,21 z" fill="#16385B"/>
  <text x="300" y="124" text-anchor="middle" fill="#5A6B86" font-size="12.5" font-weight="600">researcher &#183; human in the loop</text>
  <path d="M289,132 L289,150" stroke="#1F7E91" stroke-width="3" fill="none" marker-end="url(#ahT)"/>
  <path d="M311,150 L311,132" stroke="#1F7E91" stroke-width="3" fill="none" marker-end="url(#ahT)"/>

  <!-- TA1 grounding -->
  <circle cx="98" cy="212" r="24" fill="#F4ECFB" stroke="#8B3FC7" stroke-width="2.2"/>
  <g stroke="#8B3FC7" stroke-width="1.8" fill="#8B3FC7"><line x1="88" y1="204" x2="106" y2="200"/><line x1="106" y1="200" x2="104" y2="222"/><line x1="88" y1="204" x2="104" y2="222"/><circle cx="88" cy="204" r="3"/><circle cx="106" cy="200" r="3"/><circle cx="104" cy="222" r="3"/></g>
  <text x="98" y="250" text-anchor="middle" fill="#5A6B86" font-size="12" font-weight="600">TA1 model</text>
  <path d="M124,212 L160,212" stroke="#14284A" stroke-width="3.4" fill="none" marker-end="url(#ahT)"/>
  <text x="142" y="204" text-anchor="middle" fill="#5A6B86" font-size="10.5" font-weight="600">grounds</text>

  <!-- Agent panel -->
  <rect x="160" y="150" width="264" height="124" rx="16" fill="#EAF7FB" stroke="#BFE0EA" stroke-width="2"/>
  <text x="174" y="170" fill="#1F7E91" font-size="12" font-weight="700">Agent: plan &#8594; code &#8594; run &#8594; observe</text>
  <!-- VOI badge -->
  <path d="M404,166 L407,173 L414,173.7 L408.5,178.5 L410,185.5 L404,181.7 L398,185.5 L399.5,178.5 L394,173.7 L401,173 Z" fill="#E0A52E"/>
  <text x="404" y="198" text-anchor="middle" fill="#5A6B86" font-size="10.5" font-weight="700">VOI</text>
  <!-- loop nodes -->
  <g filter="url(#ndsh)">
    <circle cx="300" cy="196" r="16" fill="#2C9DB5"/>
    <circle cx="354" cy="236" r="16" fill="#1F7E91"/>
    <circle cx="246" cy="236" r="16" fill="#45C3DD"/>
  </g>
  <text x="300" y="200" text-anchor="middle" fill="#FFFFFF" font-size="11.5" font-weight="700">plan</text>
  <text x="354" y="240" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">&lt;/&gt;</text>
  <text x="246" y="240" text-anchor="middle" fill="#FFFFFF" font-size="10.5" font-weight="700">obs</text>
  <g stroke="#1F7E91" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M314,204 C332,212 342,220 348,226" marker-end="url(#ahT)"/>
    <path d="M338,244 C320,252 280,252 262,244" marker-end="url(#ahT)"/>
    <path d="M252,222 C258,210 272,202 284,198" marker-end="url(#ahT)"/>
  </g>

  <!-- dissent / verify streams -->
  <circle cx="462" cy="190" r="17" fill="#E0309E"/><text x="462" y="196" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="700">&#8800;</text>
  <circle cx="462" cy="236" r="17" fill="#1F7E91"/><path d="M454,236 l5,6 l11,-13" fill="none" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M424,200 C438,194 444,192 446,191" stroke="#9AB0C8" stroke-width="2.6" fill="none" marker-end="url(#ahT)"/>
  <path d="M424,226 C438,232 444,234 446,235" stroke="#9AB0C8" stroke-width="2.6" fill="none" marker-end="url(#ahT)"/>
  <text x="470" y="266" text-anchor="middle" fill="#5A6B86" font-size="11" font-weight="600">dissent / verify</text>

  <!-- environment E1 -->
  <path d="M291,274 L291,300" stroke="#1F7E91" stroke-width="3" fill="none" marker-end="url(#ahT)"/>
  <path d="M309,300 L309,274" stroke="#1F7E91" stroke-width="3" fill="none" marker-end="url(#ahT)"/>
  <g filter="url(#ndsh)">
    <rect x="196" y="302" width="66" height="40" rx="9" fill="#FFFFFF" stroke="#1F7E91" stroke-width="2"/>
    <rect x="267" y="302" width="66" height="40" rx="9" fill="#FFFFFF" stroke="#1F7E91" stroke-width="2"/>
    <rect x="338" y="302" width="66" height="40" rx="9" fill="#FFFFFF" stroke="#1F7E91" stroke-width="2"/>
  </g>
  <text x="229" y="327" text-anchor="middle" fill="#14284A" font-size="13" font-weight="600">tools</text>
  <text x="300" y="327" text-anchor="middle" fill="#14284A" font-size="13" font-weight="600">data</text>
  <text x="371" y="327" text-anchor="middle" fill="#14284A" font-size="13" font-weight="600">code</text>
  <text x="300" y="362" text-anchor="middle" fill="#1F7E91" font-size="12.5" font-weight="700">environment: 150 tools &#183; 105 packages &#183; 59 databases</text>

  <!-- text block -->
  <text x="300" y="452" text-anchor="middle" fill="#14284A" font-size="32" font-weight="700">New Science Engine</text>
  <text x="300" y="487" text-anchor="middle" fill="#1F7E91" font-size="16.5" font-weight="600">Multi-agent streams with dissent &amp; verification</text>
  <text x="300" y="510" text-anchor="middle" fill="#1F7E91" font-size="16.5" font-weight="600">Value-of-information design; human in the loop</text>
  <text x="300" y="550" text-anchor="middle" fill="#5A6B86" font-size="15.5" font-weight="500">Co-leads: Phylo (Biomni) &#160;&#183;&#160; Cytognosis</text>
</svg>
