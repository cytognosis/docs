<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" font-family="Inter, 'DejaVu Sans', Arial, sans-serif">
  <defs>
    <radialGradient id="disc" cx="50%" cy="36%" r="62%"><stop offset="0%" stop-color="#E7F7FB"/><stop offset="64%" stop-color="#F3FAFD"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1F7E91"/><stop offset="55%" stop-color="#45C3DD"/><stop offset="100%" stop-color="#8B3FC7"/></linearGradient>
    <filter id="ndsh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#13314a" flood-opacity="0.16"/></filter>
    <marker id="ahT" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1F7E91"/></marker>
    <marker id="ahG" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94A7C2"/></marker>
  </defs>

  <rect width="600" height="600" fill="#FFFFFF"/>
  <rect x="1" y="1" width="598" height="598" fill="none" stroke="#E6EDF3" stroke-width="2"/>
  <rect width="600" height="10" fill="url(#topbar)"/>
  <circle cx="300" cy="206" r="202" fill="url(#disc)"/>

  <rect x="40" y="40" width="116" height="46" rx="23" fill="#1F7E91"/>
  <text x="98" y="71" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="700" letter-spacing="1.5">TA 3</text>

  <!-- ontology / open schema badge -->
  <rect x="356" y="46" width="202" height="40" rx="20" fill="#EAF7FA" stroke="#2BA1BD" stroke-width="2"/>
  <text x="457" y="71" text-anchor="middle" fill="#1F7E91" font-size="14.5" font-weight="700">SBOL &#183; PROV-O schema</text>

  <!-- intent document feeds the stack -->
  <g filter="url(#ndsh)"><path d="M64,104 h34 l11,11 v36 h-45 z" fill="#FFFFFF" stroke="#2BA1BD" stroke-width="2"/></g>
  <path d="M98,104 v11 h11 z" fill="#D7EEF4"/>
  <g stroke="#8FBDCB" stroke-width="2.4" stroke-linecap="round"><line x1="71" y1="122" x2="101" y2="122"/><line x1="71" y1="131" x2="101" y2="131"/><line x1="71" y1="140" x2="90" y2="140"/></g>
  <text x="86" y="166" text-anchor="middle" fill="#5A6B86" font-size="11.5" font-weight="600">intent</text>
  <path d="M112,128 L146,128" stroke="#1F7E91" stroke-width="3.4" fill="none" marker-end="url(#ahT)"/>

  <!-- layered protocol stack -->
  <g filter="url(#ndsh)">
    <rect x="150" y="108" width="252" height="42" rx="11" fill="#43BBD3"/>
    <rect x="150" y="156" width="252" height="42" rx="11" fill="#2BA1BD"/>
    <rect x="150" y="204" width="252" height="42" rx="11" fill="#1F7E91"/>
    <rect x="150" y="252" width="252" height="42" rx="11" fill="#16385B"/>
  </g>
  <text x="172" y="135" fill="#FFFFFF" font-size="18" font-weight="700">Intent</text>
  <text x="172" y="183" fill="#FFFFFF" font-size="18" font-weight="700">Protocol</text>
  <text x="172" y="231" fill="#FFFFFF" font-size="18" font-weight="700">Calibration</text>
  <text x="172" y="279" fill="#FFFFFF" font-size="18" font-weight="700">Hardware</text>

  <!-- UML activity callout on the Protocol layer -->
  <g stroke="#FFFFFF" stroke-width="2" fill="#FFFFFF">
    <circle cx="312" cy="177" r="4"/>
    <rect x="324" y="171" width="16" height="12" rx="2" fill="none"/>
    <path d="M352,177 l7,-7 l7,7 l-7,7 z" fill="none"/>
    <rect x="374" y="171" width="16" height="12" rx="2" fill="none"/>
    <line x1="316" y1="177" x2="324" y2="177"/><line x1="340" y1="177" x2="345" y2="177" marker-end="url(#ahT)"/><line x1="366" y1="177" x2="374" y2="177"/>
  </g>
  <!-- calibration gauge + hardware chip glyphs -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none"><path d="M330,232 a14 14 0 0 1 28 0" /><line x1="344" y1="232" x2="352" y2="225"/></g>
  <rect x="332" y="266" width="22" height="16" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <g stroke="#FFFFFF" stroke-width="1.6"><line x1="338" y1="266" x2="338" y2="262"/><line x1="348" y1="266" x2="348" y2="262"/><line x1="338" y1="282" x2="338" y2="286"/><line x1="348" y1="282" x2="348" y2="286"/></g>

  <!-- specialization to any qualified instrument -->
  <path d="M210,294 L210,316" stroke="#94A7C2" stroke-width="2.6" fill="none" stroke-dasharray="5 4" marker-end="url(#ahG)"/>
  <path d="M300,294 L300,316" stroke="#94A7C2" stroke-width="2.6" fill="none" stroke-dasharray="5 4" marker-end="url(#ahG)"/>
  <path d="M392,294 L392,316" stroke="#94A7C2" stroke-width="2.6" fill="none" stroke-dasharray="5 4" marker-end="url(#ahG)"/>
  <g filter="url(#ndsh)">
    <rect x="180" y="318" width="60" height="46" rx="10" fill="#FFFFFF" stroke="#1F7E91" stroke-width="2"/>
    <rect x="270" y="318" width="60" height="46" rx="10" fill="#FFFFFF" stroke="#1F7E91" stroke-width="2"/>
    <rect x="362" y="318" width="60" height="46" rx="10" fill="#FFFFFF" stroke="#1F7E91" stroke-width="2"/>
  </g>
  <!-- instrument glyphs -->
  <g stroke="#1F7E91" stroke-width="2" fill="none">
    <path d="M198,330 h24 M210,330 v14 M205,344 h10"/>
    <path d="M288,332 a14 9 0 0 0 24 0 M300,341 v6"/>
    <circle cx="392" cy="338" r="9"/><path d="M392,329 v-3 M392,347 v3 M383,338 h-3 M401,338 h3"/>
  </g>
  <text x="210" y="358" text-anchor="middle" fill="#14284A" font-size="10.5" font-weight="600">OT-2</text>
  <text x="300" y="358" text-anchor="middle" fill="#14284A" font-size="10.5" font-weight="600">Echo</text>
  <text x="392" y="358" text-anchor="middle" fill="#14284A" font-size="10.5" font-weight="600">SiLA</text>
  <text x="300" y="384" text-anchor="middle" fill="#1F7E91" font-size="12.5" font-weight="700">one protocol, specialized to any instrument</text>

  <!-- abstract -> concrete -->
  <text x="416" y="126" fill="#7C8DA6" font-size="12" font-weight="600">what</text>
  <text x="412" y="286" fill="#7C8DA6" font-size="12" font-weight="600">how</text>
  <path d="M420,138 L420,266" stroke="#C2D0DE" stroke-width="2.6" fill="none" marker-end="url(#ahT)"/>

  <!-- text block -->
  <text x="300" y="436" text-anchor="middle" fill="#14284A" font-size="27" font-weight="700">Interoperable Experimental</text>
  <text x="300" y="466" text-anchor="middle" fill="#14284A" font-size="27" font-weight="700">Procedures</text>
  <text x="300" y="500" text-anchor="middle" fill="#1F7E91" font-size="16.5" font-weight="600">Layered, instrument-agnostic protocol stack;</text>
  <text x="300" y="523" text-anchor="middle" fill="#1F7E91" font-size="16.5" font-weight="600">any qualified lab runs it reproducibly</text>
  <text x="300" y="556" text-anchor="middle" fill="#5A6B86" font-size="15.5" font-weight="500">Lead: SIFT (LabOP) &#160;&#183;&#160; open schemas, RFC process</text>
</svg>
