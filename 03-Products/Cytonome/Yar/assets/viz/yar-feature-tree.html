const DOMAINS = DATA.children.map(d=>d.code);
const DOMAIN_NAMES = {}; DATA.children.forEach(d=>DOMAIN_NAMES[d.code]=d.name);
const palette = ["#8B3FC7","#3B7DD6","#2Fb3a3","#E0a11b","#D6564f","#7d8cf0"];
const color = d3.scaleOrdinal().domain(DOMAINS).range(palette);
const statusOpacity = {shipped:1.0, partial:0.74, groundwork:0.64, placeholder:0.54, planned:0.4};
const statusLabel = {shipped:"shipped", partial:"partial", groundwork:"groundwork", placeholder:"placeholder", planned:"planned"};

const tip = d3.select("#tip");
function showTip(html,ev){ tip.html(html).style("opacity",1).style("left",(ev.clientX+14)+"px").style("top",(ev.clientY+12)+"px"); }
function hideTip(){ tip.style("opacity",0); }

function domainCodeOf(node){
  let n=node; while(n.depth>1) n=n.parent;
  return (n.data&&n.data.code) ? n.data.code : (node.data.code||null);
}

let counts={dom:0,clu:0,feat:0};
(function(){
  DATA.children.forEach(d=>{counts.dom++; d.children.forEach(c=>{counts.clu++; c.children.forEach(()=>counts.feat++);});});
  d3.select("#counts").text(`${counts.dom} domains · ${counts.clu} clusters · ${counts.feat} features`);
})();

function buildLegend(){
  const L=d3.select("#legend"); L.html("");
  DATA.children.forEach(d=>{
    const el=L.append("div").attr("class","lg");
    el.append("span").attr("class","sw").style("background",color(d.code));
    el.append("span").text(`${d.code} — ${d.public}`);
  });
  const s=L.append("div").attr("class","lg").style("margin-left","8px");
  s.append("span").html("status:");
  Object.keys(statusOpacity).forEach(k=>{
    const e=L.append("div").attr("class","lg");
    e.append("span").attr("class","sw").style("background","#fff").style("opacity",statusOpacity[k]);
    e.append("span").text(k);
  });
  const g=L.append("div").attr("class","lg");
  g.append("span").attr("class","sw").style("background","transparent").style("border","2px dashed #fff");
  g.append("span").text("safety-gated");
}
buildLegend();

const svg=d3.select("#viz");
function clear(){ svg.selectAll("*").remove(); }
function dims(){ const w=document.getElementById("wrap").clientWidth, h=document.getElementById("wrap").clientHeight; return {w,h}; }

function leafTip(d){
  const g=d.data.gated?' <span class="statusdot">⛔ gated</span>':'';
  return `<b>${d.data.id} · ${d.data.name}</b><br>${d.data.desc||''}<br><span style="color:#a9abce">${statusLabel[d.data.status]||d.data.status}${g}</span>`;
}

function renderRadial(){
  clear();
  const {w,h}=dims(); const R=Math.min(w,h)/2-90;
  const g=svg.append("g").attr("transform",`translate(${w/2},${h/2})`);
  const root=d3.hierarchy(DATA);
  d3.cluster().size([2*Math.PI, R])(root);
  g.selectAll("path.link").data(root.links()).join("path")
    .attr("class","link")
    .attr("d", d3.linkRadial().angle(d=>d.x).radius(d=>d.y));
  const node=g.selectAll("g.node").data(root.descendants()).join("g")
    .attr("class","node")
    .attr("transform",d=>`rotate(${d.x*180/Math.PI-90}) translate(${d.y},0)`);
  node.append("circle")
    .attr("r",d=> d.depth===0?5 : d.children?4.5:4)
    .attr("fill",d=> d.depth===0? "#fff" : color(domainCodeOf(d)))
    .attr("fill-opacity",d=> !d.children && d.data.status ? statusOpacity[d.data.status] : 1)
    .attr("stroke",d=> d.data.gated?"#fff":"none")
    .attr("stroke-dasharray",d=> d.data.gated?"2,2":null)
    .attr("stroke-width",d=>d.data.gated?1.5:0)
    .on("mousemove",(e,d)=>{ if(!d.children) showTip(leafTip(d),e); else if(d.depth>0) showTip(`<b>${d.data.code?d.data.code+' — ':''}${d.data.name}</b>`,e); })
    .on("mouseleave",hideTip);
  node.filter(d=>d.depth>=1).append("text")
    .attr("dy","0.31em")
    .attr("x",d=> d.x<Math.PI===!d.children?6:-6)
    .attr("text-anchor",d=> d.x<Math.PI===!d.children?"start":"end")
    .attr("transform",d=> d.x>=Math.PI?"rotate(180)":null)
    .attr("class",d=> d.depth===1?"dlabel": d.children?"clabel":null)
    .text(d=> d.depth===1? d.data.code : (d.children? d.data.name : `${d.data.id} ${d.data.name}`))
    .attr("fill-opacity",d=> !d.children && d.data.status? Math.max(0.55,statusOpacity[d.data.status]):1);
}

function renderPack(){
  clear();
  const {w,h}=dims(); const S=Math.min(w,h)-20;
  const g=svg.append("g").attr("transform",`translate(${(w-S)/2},${(h-S)/2})`);
  const root=d3.hierarchy(DATA).sum(d=>d.children?0:1).sort((a,b)=>b.value-a.value);
  d3.pack().size([S,S]).padding(d=>d.depth===0?6:d.depth===1?4:2)(root);
  const nodes=g.selectAll("g.pk").data(root.descendants()).join("g")
    .attr("class","pk").attr("transform",d=>`translate(${d.x},${d.y})`);
  nodes.append("circle")
    .attr("r",d=>d.r)
    .attr("fill",d=>{
      if(d.depth===0) return "#12132400";
      const c=d3.color(color(domainCodeOf(d)));
      if(d.depth===1){c.opacity=0.14;return c;}
      if(d.depth===2){c.opacity=0.28;return c;}
      c.opacity=statusOpacity[d.data.status]||0.6; return c;
    })
    .attr("stroke",d=> d.depth===0?"none": d.data.gated?"#fff":color(domainCodeOf(d)))
    .attr("stroke-opacity",d=>d.depth===1?0.9:0.5)
    .attr("stroke-dasharray",d=> d.data.gated?"3,2":null)
    .attr("stroke-width",d=> d.data.gated?1.5:(d.depth===1?1.5:0.8))
    .on("mousemove",(e,d)=>{ if(d.depth===3) showTip(leafTip(d),e); else if(d.depth>0) showTip(`<b>${d.data.code?d.data.code+' — ':''}${d.data.name}</b>`,e); })
    .on("mouseleave",hideTip);
  nodes.filter(d=>d.depth===3 && d.r>11).append("text")
    .attr("text-anchor","middle").attr("dy","0.31em").style("font-size","8px").style("fill","#0b0b16")
    .text(d=>d.data.id);
  nodes.filter(d=>d.depth===1).append("text")
    .attr("text-anchor","middle").attr("dy",d=>-d.r-4).attr("class","dlabel")
    .text(d=>`${d.data.code} · ${d.data.public}`);
  nodes.filter(d=>d.depth===2 && d.r>26).append("text")
    .attr("text-anchor","middle").attr("dy",d=>-d.r+11).attr("class","clabel").style("fill",d=>color(domainCodeOf(d)))
    .text(d=>d.data.name.length>26?d.data.name.slice(0,24)+"…":d.data.name);
}

let current="radial";
function render(){ if(current==="radial") renderRadial(); else renderPack(); }
d3.select("#btnRadial").on("click",function(){current="radial";d3.select("#btnPack").classed("active",false);d3.select(this).classed("active",true);render();});
d3.select("#btnPack").on("click",function(){current="pack";d3.select("#btnRadial").classed("active",false);d3.select(this).classed("active",true);render();});
d3.select("#btnDownload").on("click",()=>{
  const s=new XMLSerializer().serializeToString(document.getElementById("viz"));
  const blob=new Blob(['<?xml version="1.0"?>\n'+s],{type:"image/svg+xml"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`yar-feature-${current}.svg`; a.click();
});
window.addEventListener("resize",()=>{clearTimeout(window._t);window._t=setTimeout(render,180);});
render();
</script>
</body>
</html>
