  # ===========================================================================
  # UMLS SLOTS
  # ===========================================================================

  cui:
    description: >-
      UMLS Concept Unique Identifier (CUI). The universal cross-reference
      hub for biomedical concepts. Format: C followed by 7 digits.
      With a full UMLS license, each CUI maps to 200+ source vocabularies
      (SNOMED CT, ICD-10, MeSH, RxNorm, HPO, OMIM, GO, etc.) via
      MRCONSO.RRF. This is the single most powerful normalization key
      in biomedicine.
    pattern: "^C[0-9]{7}$"
  umls_semantic_types:
    multivalued: true
    description: >-
      UMLS Semantic Type identifiers (TUIs). Format: T followed by 3
      digits (e.g., T047 = Disease or Syndrome, T116 = Amino Acid,
      Peptide, or Protein). The 127 semantic types form a hierarchy
      in the UMLS Semantic Network. Stored in MRSTY.RRF.
  umls_semantic_group:
    range: UMLSSemanticGroup
    description: >-
      UMLS Semantic Group — coarse clustering of the 127 semantic types
      into 15 groups (DISO, CHEM, GENE, ANAT, etc.). Essential for
      fast entity-type filtering and Biolink category alignment.
  umls_preferred_term:
    description: >-
      UMLS preferred term (English). The canonical human-readable name
      for this concept as designated by the UMLS Metathesaurus.
  umls_source_vocabs:
    multivalued: true
    description: >-
      Source vocabulary abbreviations (SABs) that contain this concept
      in UMLS (e.g., SNOMEDCT_US, ICD10CM, MSH, RXNORM, HPO, OMIM).
      Enables quick lookup of which vocabularies provide identifiers
      for this entity.

  # ===========================================================================
  # SEMOPENALEX SLOTS
  # ===========================================================================

  semopenalex_uri:
    range: uri
    description: >-
      SemOpenAlex RDF entity URI (e.g., https://semopenalex.org/work/W2741809807).
      Links this entity to the 26-billion-triple SemOpenAlex SPARQL endpoint.
    slot_uri: schema:sameAs
  mag_id:
    range: integer
    description: >-
      Microsoft Academic Graph legacy identifier. Preserved by SemOpenAlex
      (soa:magId) and useful for linking to MAKG archives.
    slot_uri: soa:magId
  indexed_in:
    multivalued: true
    description: >-
      Indexing services that cover this work (SemOpenAlex soa:indexedIn).
      Values: Crossref, PubMed, DOAJ, etc.
    slot_uri: soa:indexedIn
  crossref_type:
    description: >-
      Crossref type classification (SemOpenAlex soa:crossrefType).
      More granular than openalex_work_type.
    slot_uri: soa:crossrefType
  countries_distinct_count:
    range: integer
    description: >-
      Number of distinct countries represented among authors
      (SemOpenAlex soa:countriesDistinctCount).
    slot_uri: soa:countriesDistinctCount
