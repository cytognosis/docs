# =============================================================================
# Cytognosis Foundation — Scholarly Knowledge Graph Schema v0.3.0
# =============================================================================
#
# Design goals:
#   1. Full BibTeX/BibLaTeX entry types with required/optional fields
#   2. Full OpenAlex entity coverage (Work–Award, Geo, Authorship, Location)
#   3. SemOpenAlex RDF alignment (soa:, cito:, prism:, bido:, skos:)
#   4. Biolink Model alignment for all biomedical entities
#   5. NCATS Translator compatibility (TRAPI, qualifiers, infores, KP-readiness)
#   6. UMLS as default medical identifier hub (CUI, TUI, Semantic Groups)
#   7. PubMedKG compatibility (articles, patents, trials, bio-associations)
#   8. W3C Web Annotation personalization layer
#   9. First-class Dataset entity (DCAT 3, DATS, Croissant, DataCite, RO-Crate)
#  10. First-class Code entity (CodeMeta, CFF, Software Heritage)
#  11. First-class MLModel entity (HuggingFace Model Cards, Croissant ML)
#  12. License as entity (SPDX, ODRL, Creative Commons, OpenRAIL)
#  13. Online content types (WebPage, BlogPost, ForumPost, Notebook)
#  14. Paper subtypes (AIMLPaper, BiomedicalPaper) with expected artifact links
#  15. Published/deployed model registry entries (HuggingFace Hub)
#
# Standards mapped:
#   schema:    — Schema.org               dcterms:  — Dublin Core Terms
#   bibo:      — Bibliographic Ontology    foaf:     — FOAF
#   fabio:     — FRBR-aligned Bib Ontology oa:       — W3C Web Annotation
#   biolink:   — Biolink Model             dcat:     — DCAT 3
#   codemeta:  — CodeMeta                  spdx:     — SPDX License
#   prov:      — W3C PROV Ontology         odrl:     — ODRL 2.2
#   dats:      — Data Tag Suite            croissant: — Croissant (MLCommons)
#   swh:       — Software Heritage         datacite: — DataCite
#   soa:       — SemOpenAlex Ontology      cito:     — Citation Typing Ontology
#   prism:     — PRISM (publishing)        bido:     — Bibliometric Data Ontology
#   skos:      — SKOS (concepts)           umls:     — UMLS Metathesaurus
#   infores:   — Biolink InfoRes           NCIT:     — NCI Thesaurus
#
# Version: 0.3.0
# License: CC-BY-4.0
# =============================================================================

id: https://schema.cytognosis.org/scholarly-kg
name: cytognosis_scholarly_kg
title: Cytognosis Scholarly Knowledge Graph Schema
description: >-
  Comprehensive LinkML schema unifying bibliographic metadata (BibTeX),
  scholarly entities (OpenAlex/SemOpenAlex), biomedical knowledge
  (Biolink/PubMedKG/UMLS), NCATS Translator compatibility, research
  artifacts (code, data, models), licenses, and W3C Web Annotation.
version: 0.3.0
license: https://creativecommons.org/licenses/by/4.0/

prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  bibo: http://purl.org/ontology/bibo/
  foaf: http://xmlns.com/foaf/0.1/
  fabio: http://purl.org/spar/fabio/
  oa: http://www.w3.org/ns/oa#
  biolink: https://w3id.org/biolink/vocab/
  dcat: http://www.w3.org/ns/dcat#
  dats: https://datatagsuite.github.io/schema/
  codemeta: https://codemeta.github.io/terms/
  spdx: http://spdx.org/rdf/terms#
  odrl: http://www.w3.org/ns/odrl/2/
  prov: http://www.w3.org/ns/prov#
  swh: https://www.softwareheritage.org/schema/
  datacite: https://schema.datacite.org/
  croissant: http://mlcommons.org/croissant/
  # SemOpenAlex + SPAR ontologies
  soa: https://semopenalex.org/ontology/
  cito: http://purl.org/spar/cito/
  prism: http://prismstandard.org/namespaces/basic/2.0/
  bido: http://purl.org/spar/bido/
  skos: http://www.w3.org/2004/02/skos/core#
  org: http://www.w3.org/ns/org#
  # UMLS + NCI
  umls: https://uts.nlm.nih.gov/uts/umls/concept/
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  # NCATS Translator
  infores: https://w3id.org/biolink/vocab/infores/
  # Entity namespaces
  openalex: https://openalex.org/
  semopenalex: https://semopenalex.org/
  wikidata: http://www.wikidata.org/entity/
  ORCID: https://orcid.org/
  ROR: https://ror.org/
  DOI: https://doi.org/
  PMID: https://pubmed.ncbi.nlm.nih.gov/
  NCBIGene: https://www.ncbi.nlm.nih.gov/gene/
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HP: http://purl.obolibrary.org/obo/HP_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  DRUGBANK: https://go.drugbank.com/drugs/
  CHEMBL_COMPOUND: https://www.ebi.ac.uk/chembl/compound_report_card/
  UniProtKB: https://www.uniprot.org/uniprot/
  REACTOME: https://reactome.org/content/detail/
  MESH: http://id.nlm.nih.gov/mesh/
  cytognosis: https://schema.cytognosis.org/scholarly-kg/

default_prefix: cytognosis
default_range: string
imports:
  - linkml:types


