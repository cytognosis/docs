# =============================================================================
# CLASSES
# =============================================================================
classes:

  # ===========================================================================
  # MIXINS
  # ===========================================================================

  HasTimestamps:
    mixin: true
    slots:
      - created_date
      - updated_date

  HasMetrics:
    mixin: true
    description: Scholarly impact metrics (OpenAlex pattern).
    slots:
      - works_count
      - cited_by_count
      - h_index
      - i10_index
      - counts_by_year

  HasExternalIds:
    mixin: true
    slots:
      - doi
      - pmid
      - pmcid
      - arxiv_id
      - ssrn_id
      - openalex_id
      - wikidata_id
      - crossref_id
      - scopus_id

  HasImages:
    mixin: true
    slots:
      - image_url
      - image_thumbnail_url

  HasTopics:
    mixin: true
    slots:
      - topics
      - keywords

  HasGeo:
    mixin: true
    slots:
      - geo

  HasProvenance:
    mixin: true
    description: W3C PROV-aligned provenance tracking.
    class_uri: prov:Entity
    slots:
      - data_source
      - confidence_score
      - extraction_method
      - was_derived_from
      - was_generated_by
      - was_attributed_to

  HasLicense:
    mixin: true
    description: Anything that can be licensed.
    slots:
      - license_ref
      - license_spdx_id
      - license_text

  HasCytognosisLinks:
    mixin: true
    description: >-
      Cytognosis-specific links to internal artifacts. Maps to Zotero Extra
      field key-value pairs.
    slots:
      - drive_pdf_url
      - code_original_url
      - code_internal_url
      - dataset_original_url
      - dataset_internal_url
      - model_original_url
      - model_internal_url

  # ---- UMLS mixin ----------------------------------------------------------
  HasUMLS:
    mixin: true
    description: >-
      UMLS Metathesaurus integration. Provides CUI (Concept Unique
      Identifier) as the universal cross-reference hub for biomedical
      entities. With a full UMLS license, CUIs map to 200+ source
      vocabularies (SNOMED CT, ICD-10, MeSH, RxNorm, HPO, OMIM, etc.).
    slots:
      - cui
      - umls_semantic_types
      - umls_semantic_group
      - umls_preferred_term
      - umls_source_vocabs

  # ---- SemOpenAlex mixin ---------------------------------------------------
  HasSemOpenAlex:
    mixin: true
    description: >-
      SemOpenAlex RDF Knowledge Graph compatibility. Provides the
      SemOpenAlex URI, MAG ID (legacy), and indexing metadata.
    slots:
      - semopenalex_uri
      - mag_id
      - indexed_in

  # ---- NCATS Translator mixin ---------------------------------------------
  HasTranslatorCompat:
    mixin: true
    description: >-
      NCATS Biomedical Data Translator compatibility. Adds TRAPI-required
      fields for any entity that could serve as a node in a Translator
      Knowledge Provider: canonical CURIEs, infores provenance, and
      NodeNormalization-compatible identifiers.
    slots:
      - infores
      - knowledge_level
      - agent_type
      - translator_canonical_id
      - translator_equivalent_ids


  # ===========================================================================
  # ABSTRACT BASE CLASSES
  # ===========================================================================

  NamedThing:
    abstract: true
    class_uri: biolink:NamedThing
    description: >-
      Root class — aligned with Biolink NamedThing.
    slots:
      - id
      - display_name
      - description
      - alternate_names
      - category
    slot_usage:
      id:
        required: true
        identifier: true
      display_name:
        required: true

  ScholarlyEntity:
    abstract: true
    is_a: NamedThing
    mixins:
      - HasTimestamps
      - HasExternalIds
      - HasSemOpenAlex
    description: >-
      Entity in the scholarly communication ecosystem. HasSemOpenAlex mixin
      provides SemOpenAlex RDF URI for linked-data interoperability.

  Agent:
    abstract: true
    is_a: NamedThing
    class_uri: biolink:Agent
    description: Person or organization.
    slots:
      - homepage_url


  # ===========================================================================
  # LICENSE — First-class entity (SPDX + ODRL + OpenRAIL)
  # ===========================================================================

  License:
    is_a: NamedThing
    class_uri: spdx:License
    description: >-
      A license governing use of software, data, models, or content. Modeled
      as a first-class entity to support SPDX identifiers, ODRL permissions,
      and the OpenRAIL family of responsible AI licenses.
    slots:
      - spdx_id
      - license_family
      - license_scope
      - license_url
      - is_osi_approved
      - is_fsf_libre
      - is_copyleft
      - permissions
      - license_conditions
      - limitations
      - use_restrictions
      - deprecated
    slot_usage:
      spdx_id:
        description: >-
          SPDX identifier (e.g., MIT, Apache-2.0, CC-BY-4.0, OpenRAIL-M).
          For non-SPDX licenses (OpenRAIL variants, Llama, etc.) use a
          Cytognosis-minted URI.


  # ===========================================================================
  # BIBLIOGRAPHIC RESOURCES — BibTeX hierarchy
  # ===========================================================================

  BibliographicResource:
    abstract: true
    is_a: ScholarlyEntity
    class_uri: biolink:Publication
    mixins:
      - HasMetrics
      - HasTopics
      - HasCytognosisLinks
      - HasLicense
    description: >-
      Abstract base for all citable works. Inherits from Biolink Publication.
      SemOpenAlex alignment: maps to soa:Work. Citation edges use cito:cites.
      Bibliometric properties use prism:, fabio:, bido: URIs.
    slots:
      # SemOpenAlex additional properties
      - crossref_type
      - countries_distinct_count
      - institutions_distinct_count
      - has_sustainable_development_goal
      - cites
      - title
      - authors_text
      - year
      - month
      - abstract_text
      - note
      - language
      - url
      - bibtex_entry_type
      - openalex_work_type
      - publication_date
      - volume
      - issue
      - pages
      - first_page
      - last_page
      - edition
      - series
      - chapter
      - page_total
      - isbn
      - issn
      - eprint
      - eprint_type
      - version
      - open_access
      - is_retracted
      - is_paratext
      - authorships
      - referenced_works
      - related_works
      - locations
      - source_ref
      - grants
      - mesh_terms
      - bio_entity_mentions
    slot_usage:
      title:
        required: true
        slot_uri: dcterms:title

  # ---- Concrete BibTeX entry types -----------------------------------------

  Article:
    is_a: BibliographicResource
    class_uri: fabio:JournalArticle
    description: "BibTeX @article. Required: author, title, journal, year."
    slots:
      - journal
    slot_usage:
      journal: { required: true }
      year: { required: true }

  Book:
    is_a: BibliographicResource
    class_uri: fabio:Book
    description: "BibTeX @book. Required: author/editor, title, publisher, year."
    slots: [publisher_name, editor_text, address]
    slot_usage:
      publisher_name: { required: true }
      year: { required: true }

  InBook:
    is_a: BibliographicResource
    class_uri: fabio:BookChapter
    description: "BibTeX @inbook. Required: author/editor, title, chapter/pages, publisher, year."
    slots: [publisher_name, editor_text, address, book_title]
    slot_usage:
      publisher_name: { required: true }
      year: { required: true }

  InCollection:
    is_a: BibliographicResource
    class_uri: fabio:BookChapter
    description: "BibTeX @incollection. Required: author, title, booktitle, publisher, year."
    slots: [book_title, publisher_name, editor_text, address, entry_type_field]
    slot_usage:
      book_title: { required: true }
      publisher_name: { required: true }
      year: { required: true }

  InProceedings:
    is_a: BibliographicResource
    class_uri: fabio:ConferencePaper
    description: "BibTeX @inproceedings / @conference. Required: author, title, booktitle, year."
    slots: [book_title, editor_text, publisher_name, organization, address]
    slot_usage:
      book_title: { required: true }
      year: { required: true }

  Conference:
    is_a: InProceedings
    description: Alias for InProceedings.

  Proceedings:
    is_a: BibliographicResource
    class_uri: fabio:ConferenceProceedings
    description: "BibTeX @proceedings. Required: title, year."
    slots: [editor_text, publisher_name, organization, address]
    slot_usage:
      year: { required: true }

  PhdThesis:
    is_a: BibliographicResource
    class_uri: fabio:DoctoralThesis
    description: "BibTeX @phdthesis. Required: author, title, school, year."
    slots: [school, address, entry_type_field]
    slot_usage:
      school: { required: true }
      year: { required: true }

  MastersThesis:
    is_a: BibliographicResource
    class_uri: fabio:MastersThesis
    description: "BibTeX @mastersthesis. Required: author, title, school, year."
    slots: [school, address, entry_type_field]
    slot_usage:
      school: { required: true }
      year: { required: true }

  TechReport:
    is_a: BibliographicResource
    class_uri: fabio:TechnicalReport
    description: "BibTeX @techreport. Required: author, title, institution, year."
    slots: [institution_name, address, report_number, entry_type_field]
    slot_usage:
      institution_name: { required: true }
      year: { required: true }

  Manual:
    is_a: BibliographicResource
    class_uri: fabio:Manual
    description: "BibTeX @manual. Required: title."
    slots: [organization, address, editor_text]

  Booklet:
    is_a: BibliographicResource
    class_uri: fabio:Booklet
    description: "BibTeX @booklet. Required: title."
    slots: [how_published, address]

  Unpublished:
    is_a: BibliographicResource
    class_uri: fabio:Preprint
    description: "BibTeX @unpublished. Required: author, title, note."
    slot_usage:
      note: { required: true }

  MiscEntry:
    is_a: BibliographicResource
    class_uri: fabio:Expression
    description: "BibTeX @misc. No required fields."
    slots: [how_published]

  PatentEntry:
    is_a: BibliographicResource
    class_uri: fabio:Patent
    description: Patent document (BibLaTeX/PubMedKG).
    slots: [patent_number, patent_holder, filing_date, grant_date]

  Standard:
    is_a: BibliographicResource
    class_uri: fabio:Specification
    description: Technical or industry standard.
    slots: [organization, address, report_number]

  ReviewArticle:
    is_a: Article
    class_uri: fabio:ReviewArticle
    description: Review article surveying a field.

  Preprint:
    is_a: BibliographicResource
    class_uri: fabio:Preprint
    description: Pre-peer-review manuscript.
    slots: [preprint_server]

  # ---- Domain-specific paper subtypes --------------------------------------

  AIMLPaper:
    is_a: Article
    description: >-
      AI/ML paper expected to have associated models, training datasets,
      evaluation benchmarks, and code repositories.
    slots:
      - associated_models
      - training_datasets
      - evaluation_datasets
      - associated_code_repos
      - benchmark_results
      - compute_used

  BiomedicalPaper:
    is_a: Article
    description: >-
      Biomedical paper expected to have associated experimental datasets,
      biological entities studied, clinical trials, and protocols.
    slots:
      - associated_datasets
      - studied_entities
      - related_trials
      - protocols
      - specimen_types

  # ---- Online content types ------------------------------------------------

  OnlineContent:
    is_a: BibliographicResource
    class_uri: biolink:WebPage
    description: >-
      Any online-only content — blog posts, forum threads, notebooks, videos.
      Designed for easy Chrome extension capture.
    slots:
      - online_content_type
      - platform_name
      - url_date
      - author_username
      - reading_time_minutes
      - claps_or_likes
      - comment_count

  BlogPost:
    is_a: OnlineContent
    description: Blog post (personal blog, Medium, Substack, etc.).

  ForumPost:
    is_a: OnlineContent
    description: Forum post, StackOverflow answer, Reddit post, etc.

  NotebookEntry:
    is_a: OnlineContent
    description: Jupyter/Colab/Observable notebook published online.
    slots:
      - notebook_runtime
      - notebook_kernel

  VideoContent:
    is_a: OnlineContent
    description: YouTube talk, conference recording, tutorial video.
    slots:
      - duration_seconds
      - transcript_url


  # ===========================================================================
  # AGENTS
  # ===========================================================================

  Person:
    is_a: Agent
    class_uri: biolink:Person
    mixins: [HasTimestamps, HasExternalIds, HasMetrics, HasTopics, HasImages, HasSemOpenAlex]
    description: >-
      Researcher / author (OpenAlex Author, PubMedKG Author).
      SemOpenAlex: soa:Author with foaf:name, org:memberOf, bido:h-index.
    slots:
      - given_name
      - family_name
      - name_alternatives
      - orcid
      - affiliations
      - last_known_institution
      - last_publication_date
      # SemOpenAlex Author metrics
      - two_yr_mean_citedness

  Organization:
    abstract: true
    is_a: Agent
    class_uri: biolink:Organization
    mixins: [HasTimestamps, HasExternalIds, HasMetrics, HasTopics, HasImages, HasGeo, HasSemOpenAlex]
    slots:
      - ror_id
      - country_code
      - country_name
      - organization_roles

  Institution:
    is_a: Organization
    class_uri: schema:ResearchOrganization
    description: >-
      OpenAlex Institution + PubMedKG Affiliation.
      SemOpenAlex: soa:Institution with soa:hasParentInstitution,
      soa:hasChildInstitution, soa:hasAssociatedInstitution.
    slots:
      - institution_type
      - lineage
      - associated_institutions
      - international_status
      # SemOpenAlex institution hierarchy
      - parent_institution
      - child_institutions
      - acronym

  Publisher:
    is_a: Organization
    description: OpenAlex Publisher.
    slots: [parent_publisher, hierarchy_level, sources_count]

  Funder:
    is_a: Organization
    class_uri: schema:FundingAgency
    description: OpenAlex Funder.
    slots: [grants_count]


  # ===========================================================================
  # PUBLICATION VENUE
  # ===========================================================================

  Source:
    is_a: ScholarlyEntity
    class_uri: fabio:PeriodicalPublicationVenue
    mixins: [HasMetrics, HasTopics, HasImages]
    description: >-
      Journal, repository, conference, book series (OpenAlex Source).
      SemOpenAlex: soa:Source with fabio:hasURL, prism: page metadata.
    slots:
      - issn_l
      - issn_list
      - source_type
      - host_organization
      - is_oa
      - is_in_doaj
      - apc_usd
      - apc_prices
      - homepage_url
      - country_code


  # ===========================================================================
  # FUNDING
  # ===========================================================================

  Award:
    is_a: ScholarlyEntity
    class_uri: schema:MonetaryGrant
    mixins: [HasTimestamps]
    description: A grant or funding award (OpenAlex Award).
    slots:
      - funder_ref
      - funder_award_id
      - award_amount_usd
      - currency
      - awardee_ref
      - investigators
      - funded_works
      - award_status
      - start_date
      - end_date


  # ===========================================================================
  # CLASSIFICATION
  # ===========================================================================

  Topic:
    is_a: NamedThing
    mixins: [HasMetrics, HasTimestamps, HasUMLS, HasSemOpenAlex]
    description: >-
      OpenAlex Topic hierarchy (Domain > Field > Subfield > Topic).
      SemOpenAlex models these as skos:Concept with skos:broader hierarchy
      and links to Wikidata via owl:sameAs. UMLS CUI enables cross-mapping
      of biomedical topics to MeSH, SNOMED CT, etc.
    slots:
      - hierarchy_level_type
      - parent_domain
      - parent_field
      - parent_subfield
      # SemOpenAlex / SKOS concept alignment
      - skos_broader
      - skos_related
      - skos_pref_label
      - skos_in_scheme
      - wikidata_qid
      - concept_score

  MeSHTerm:
    is_a: NamedThing
    mixins: [HasUMLS]
    description: >-
      Medical Subject Heading (PubMed indexing). UMLS CUI provides
      cross-mapping to SNOMED CT, ICD-10, and other vocabularies.
      SemOpenAlex links via soa:hasMesh to http://id.nlm.nih.gov/mesh/.
    slots: [mesh_id, mesh_qualifiers, mesh_tree_numbers, scope_note]


  # ===========================================================================
  # BIOMEDICAL ENTITIES — Biolink Model aligned
  # ===========================================================================

  BiologicalEntity:
    abstract: true
    is_a: NamedThing
    class_uri: biolink:BiologicalEntity
    mixins: [HasExternalIds, HasProvenance, HasTimestamps, HasUMLS, HasTranslatorCompat]
    description: >-
      Abstract base for all biomedical entities. Aligned with Biolink Model
      biological_entity. All PubMedKG entity types are concrete subclasses.
      HasUMLS mixin: CUI is the universal cross-reference hub — all source
      vocabulary IDs (SNOMED CT, ICD-10, MeSH, HPO, RxNorm, DrugBank, etc.)
      can be resolved through the CUI. UMLS semantic types/groups enable
      coarse entity classification.
      HasTranslatorCompat mixin: enables this entity to serve as a node
      in an NCATS Translator Knowledge Provider (TRAPI-compliant CURIEs,
      infores provenance, NodeNormalization-compatible identifiers).
    slots:
      - bio_entity_type
      - synonyms
      - in_taxon
      - external_db_refs
      - mentioned_in_works
      - xref

  Gene:
    is_a: BiologicalEntity
    class_uri: biolink:Gene
    description: Gene entity (Biolink Gene, PubMedKG Gene).
    slots:
      - ncbi_gene_id
      - hgnc_symbol
      - ensembl_id
      - gene_ontology_terms
      - associated_diseases
      - expressed_in_tissues
      - has_gene_product

  Protein:
    is_a: BiologicalEntity
    class_uri: biolink:Protein
    description: Protein entity (Biolink Protein).
    slots:
      - uniprot_id
      - pdb_id
      - protein_family
      - gene_product_of
      - molecular_weight
      - sequence

  Disease:
    is_a: BiologicalEntity
    class_uri: biolink:Disease
    description: Disease entity (Biolink Disease, PubMedKG Disease).
    slots:
      - mondo_id
      - doid
      - mesh_disease_id
      - omim_id
      - icd_codes
      - associated_genes
      - indicated_drugs

  PhenotypicFeature:
    is_a: BiologicalEntity
    class_uri: biolink:PhenotypicFeature
    description: Observable phenotypic characteristic (Biolink PhenotypicFeature).
    slots:
      - hpo_id
      - associated_diseases
      - associated_genes

  Drug:
    is_a: BiologicalEntity
    class_uri: biolink:Drug
    description: Drug entity (Biolink Drug, PubMedKG Drug).
    slots:
      - drugbank_id
      - chembl_id
      - pubchem_cid
      - rxnorm_id
      - mechanism_of_action
      - drug_targets
      - indications

  SmallMolecule:
    is_a: BiologicalEntity
    class_uri: biolink:SmallMolecule
    description: Non-drug chemical entity (Biolink SmallMolecule).
    slots:
      - chembl_id
      - pubchem_cid
      - inchi
      - smiles
      - molecular_formula

  OrganismTaxon:
    is_a: BiologicalEntity
    class_uri: biolink:OrganismTaxon
    description: Species / organism (Biolink OrganismTaxon, PubMedKG Species).
    slots: [ncbi_taxonomy_id, common_name]

  SequenceVariant:
    is_a: BiologicalEntity
    class_uri: biolink:SequenceVariant
    description: Genetic variant (Biolink SequenceVariant, PubMedKG Mutation).
    slots:
      - hgvs_notation
      - variant_gene
      - variant_type
      - clinical_significance
      - dbsnp_id
      - clinvar_id

  AnatomicalEntity:
    is_a: BiologicalEntity
    class_uri: biolink:AnatomicalEntity
    description: Anatomical structure (Biolink AnatomicalEntity, UBERON).
    slots: [uberon_id]

  Cell:
    is_a: AnatomicalEntity
    class_uri: biolink:Cell
    description: Cell type (Biolink Cell, Cell Ontology).
    slots: [cell_ontology_id]

  CellLine:
    is_a: BiologicalEntity
    class_uri: biolink:CellLine
    description: Cultured cell line (Biolink CellLine).
    slots: [cellosaurus_id, species_of_origin]

  Pathway:
    is_a: BiologicalEntity
    class_uri: biolink:Pathway
    description: Biological pathway (Biolink Pathway).
    slots: [reactome_id, kegg_id, participating_genes]

  MolecularActivity:
    is_a: BiologicalEntity
    class_uri: biolink:MolecularActivity
    description: GO Molecular Function (Biolink MolecularActivity).
    slots: [go_id]

  BiologicalProcess:
    is_a: BiologicalEntity
    class_uri: biolink:BiologicalProcess
    description: GO Biological Process (Biolink BiologicalProcess).
    slots: [go_id]

  CellularComponent:
    is_a: BiologicalEntity
    class_uri: biolink:CellularComponent
    description: GO Cellular Component (Biolink CellularComponent).
    slots: [go_id]

  ClinicalTrial:
    is_a: ScholarlyEntity
    mixins: [HasTimestamps, HasUMLS]
    description: >-
      Clinical trial record (PubMedKG ClinicalTrial). UMLS CUI maps
      trial conditions/interventions to standard vocabularies.
    slots:
      - nct_id
      - trial_status
      - trial_phase
      - conditions
      - interventions
      - sponsor
      - principal_investigator
      - enrollment
      - start_date
      - end_date
      - related_articles


  # ===========================================================================
  # BIO-ENTITY ASSOCIATION (Biolink-aligned edges)
  # ===========================================================================

  BioEntityAssociation:
    is_a: NamedThing
    class_uri: biolink:Association
    mixins: [HasProvenance, HasTranslatorCompat]
    description: >-
      Typed, evidence-backed association between biomedical entities.
      Aligned with Biolink Association. PubMedKG edge with provenance.
      NCATS Translator compatible: includes knowledge_level, agent_type,
      infores, and qualifier slots for TRAPI-compliant edge export.
    slots:
      - subject_entity
      - predicate
      - object_entity
      - association_type
      - supporting_publications
      - co_occurrence_count
      - p_value
      - effect_size
      - negated
      # NCATS Translator qualifier slots
      - qualified_predicate
      - subject_aspect_qualifier
      - object_aspect_qualifier
      - subject_direction_qualifier
      - object_direction_qualifier
      - anatomical_context_qualifier
      - species_context_qualifier
      - temporal_context_qualifier

  # ---- Translator-specialized Association subtypes -------------------------
  ChemicalToGeneAssociation:
    is_a: BioEntityAssociation
    class_uri: biolink:ChemicalToGeneAssociation
    description: >-
      Chemical/drug → gene association (e.g., drug affects gene expression).
      Biolink subtype used in NCATS Translator Molecular Data Provider.

  ChemicalToDiseaseAssociation:
    is_a: BioEntityAssociation
    class_uri: biolink:ChemicalToDiseaseAssociation
    description: >-
      Chemical/drug → disease association (e.g., drug treats disease).
      Biolink subtype for Translator Drug/Clinical providers.

  GeneToDiseaseAssociation:
    is_a: BioEntityAssociation
    class_uri: biolink:GeneToDiseaseAssociation
    description: >-
      Gene → disease association (e.g., GWAS hit, causal variant).
      Biolink subtype for Translator Genetics Provider.

  GeneToExpressionSiteAssociation:
    is_a: BioEntityAssociation
    class_uri: biolink:GeneToExpressionSiteAssociation
    description: >-
      Gene → anatomical site expression (e.g., gene expressed_in liver).
      Biolink subtype for Translator tissue expression data.


  # ===========================================================================
  # RESEARCH ARTIFACTS
  # ===========================================================================

  # ---- CODE (CodeMeta + CFF + Software Heritage) ---------------------------

  CodeRepository:
    is_a: ScholarlyEntity
    class_uri: codemeta:SoftwareSourceCode
    mixins: [HasTopics, HasLicense, HasProvenance]
    description: >-
      Code repository linked to publications. Schema aligned with CodeMeta,
      CITATION.cff, and Software Heritage.
    slots:
      # Identity
      - repository_url
      - github_url
      - swh_id
      # Authorship
      - contributors
      - maintainers
      # Technical
      - programming_languages
      - software_version
      - software_requirements
      - operating_systems
      - runtime_platform
      - build_instructions
      - dependency_list
      - development_status
      - continuous_integration_url
      - test_framework
      - code_coverage_percent
      # Metrics
      - stars_count
      - forks_count
      - download_count
      # Relationships
      - fork_of
      - is_part_of
      - associated_papers
      - associated_datasets
      - associated_models
      # CodeMeta specific
      - date_published
      - date_modified
      - issn
      - reference_publication
      - readme_url
      - issue_tracker_url
      - documentation_url

  # ---- DATASET (DCAT 3 + DATS + Croissant + DataCite + RO-Crate) ----------

  Dataset:
    is_a: ScholarlyEntity
    class_uri: dcat:Dataset
    mixins: [HasTopics, HasLicense, HasProvenance]
    description: >-
      Research dataset as first-class KG entity. Schema unifies DCAT 3,
      DATS (NIH), Croissant (MLCommons), DataCite, and RO-Crate.
    slots:
      # Identity
      - repository_url
      - zenodo_url
      - datacite_doi
      # Access
      - access_level
      - access_url
      - download_url
      - access_requirements
      - embargo_end_date
      # Description
      - data_type
      - data_formats
      - record_count
      - size_bytes
      - number_of_files
      - schema_description
      - variables
      # Coverage
      - spatial_coverage
      - temporal_coverage_start
      - temporal_coverage_end
      - species_coverage
      # Quality
      - quality_annotation
      - completeness
      - collection_method
      - processing_pipeline
      # Provenance (DATS: Material, Method, Activity)
      - produced_by_activity
      - derived_from_datasets
      - source_organisms
      - instruments_used
      # Relationships
      - associated_papers
      - associated_code_repos
      - associated_models
      - contributors
      # Versioning
      - dataset_version
      - version_history
      # FAIR
      - fair_score
      - persistent_id_type
      - metadata_standard
      # Croissant ML extensions
      - record_sets
      - is_training_data_for
      - is_evaluation_data_for
      # DATS specific
      - stored_in
      - data_use_conditions
      # Temporal
      - date_published
      - date_modified
      - date_collected

  DataDistribution:
    description: >-
      A specific available form of a dataset (DCAT Distribution).
    class_uri: dcat:Distribution
    slots:
      - download_url
      - access_url
      - media_type
      - byte_size
      - compression_format
      - checksum
      - distribution_description

  # ---- ML MODEL (HuggingFace Model Cards + Croissant) ---------------------

  MLModel:
    abstract: true
    is_a: ScholarlyEntity
    class_uri: schema:SoftwareApplication
    mixins: [HasTopics, HasLicense, HasProvenance]
    description: >-
      Abstract base for machine learning models. Schema aligned with
      HuggingFace Model Cards (Mitchell et al. 2018) and Croissant ML.
    slots:
      # Identity
      - model_url
      - huggingface_url
      - model_architecture
      - model_family
      # Task & Framework
      - ml_task
      - ml_framework
      - library_name
      # Lineage
      - base_model
      - fine_tuned_from
      - training_datasets
      - evaluation_datasets
      # Size & Performance
      - parameter_count
      - model_size_bytes
      - precision
      - benchmark_results
      - evaluation_metrics
      # Hardware & Cost
      - hardware_used
      - training_time_hours
      - training_cost_usd
      - carbon_emissions_kg
      - inference_hardware
      # Responsible AI (Model Cards)
      - intended_uses
      - out_of_scope_uses
      - known_limitations
      - bias_risks
      - ethical_considerations
      - disaggregated_results
      # Relationships
      - associated_papers
      - associated_code_repos
      - contributors
      # Versioning
      - model_version
      - date_published

  PublishedModel:
    is_a: MLModel
    description: >-
      A model published on a registry (HuggingFace Hub, ONNX Zoo, TF Hub).
      Captures registry-specific metadata: downloads, likes, pipeline widget.
    slots:
      - registry_name
      - registry_id
      - download_count
      - likes_count
      - inference_api_enabled
      - pipeline_tag
      - model_tags
      - spaces_using_model
      - model_card_text

  LocalModel:
    is_a: MLModel
    description: >-
      An internal/private model not published to a public registry.
      E.g., a fine-tuned variant stored on Cytognosis GCP.
    slots:
      - internal_storage_url
      - deployment_status


  # ===========================================================================
  # W3C WEB ANNOTATION
  # ===========================================================================

  Annotation:
    is_a: NamedThing
    class_uri: oa:Annotation
    mixins: [HasTimestamps]
    description: >-
      W3C Web Annotation — the personalization layer over any KG object.
    slots:
      - annotation_creator
      - motivation
      - annotation_body
      - annotation_target
      - generated_at
    slot_usage:
      annotation_target: { required: true }

  AnnotationBody:
    class_uri: oa:TextualBody
    slots: [body_value, body_format, body_language, body_purpose]

  AnnotationTarget:
    class_uri: oa:SpecificResource
    slots: [target_source_uri, target_selector, target_scope]

  AnnotationSelector:
    class_uri: oa:Selector
    slots: [selector_type, selector_value, start_offset, end_offset]


  # ===========================================================================
  # EMBEDDED / ASSOCIATION CLASSES
  # ===========================================================================

  Authorship:
    description: >-
      Author–Work association with position and affiliation (OpenAlex).
      SemOpenAlex: soa:Authorship with soa:hasAuthor, soa:position,
      soa:isCorresponding, soa:rawAffiliation, soa:hasOrganization.
    slots:
      - person_ref
      - author_position
      - is_corresponding
      - institution_refs
      - raw_affiliation_string

  Location:
    description: Where a work is hosted (OpenAlex Location).
    slots:
      - landing_page_url
      - pdf_url
      - location_source
      - work_version
      - location_license
      - is_oa

  OpenAccessInfo:
    slots: [is_oa, oa_status, oa_url]

  GeoLocation:
    class_uri: schema:Place
    slots: [city, region, country_code, country_name, continent, latitude, longitude, geonames_city_id]

  APCPrice:
    slots: [currency, price, price_usd]

  YearlyCount:
    slots: [count_year, count_works, count_citations]

  Affiliation:
    description: Author-institution association over years.
    slots: [institution_ref, affiliation_years]

  OrganizationRole:
    description: An institution can also act as funder or publisher (OpenAlex).
    slots: [role_type, role_entity_id, role_works_count]

  ExternalDatabaseRef:
    description: Reference to an external database identifier.
    slots: [db_name, db_id, db_url]

  BenchmarkResult:
    description: Performance on a named benchmark or metric.
    slots:
      - benchmark_name
      - metric_name
      - metric_value
      - dataset_ref
      - split
      - verified

  DisaggregatedResult:
    description: >-
      Model performance broken down by demographic group, geography, or data
      slice (Model Cards for Model Reporting, Mitchell et al. 2018).
    slots:
      - group_name
      - group_value
      - metric_name
      - metric_value

  RecordSet:
    description: >-
      Croissant ML RecordSet — a logical table within a dataset.
    class_uri: croissant:RecordSet
    slots:
      - record_set_name
      - record_set_description
      - fields


