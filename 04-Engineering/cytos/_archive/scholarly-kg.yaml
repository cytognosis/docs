  skos_pref_label:
    description: SKOS preferred label (skos:prefLabel).
    slot_uri: skos:prefLabel
  skos_in_scheme:
    description: >-
      SKOS concept scheme this topic belongs to (skos:inScheme).
    slot_uri: skos:inScheme
  wikidata_qid:
    description: >-
      Wikidata entity QID (e.g., Q12345). SemOpenAlex links concepts
      to Wikidata via owl:sameAs.
  concept_score:
    range: float
    description: >-
      Relevance score of a concept to a work (SemOpenAlex
      soa:ConceptScore). Range 0.0–1.0.
  # SemOpenAlex Institution hierarchy slots
  parent_institution:
    range: Institution
    description: >-
      Parent institution in organizational hierarchy
      (SemOpenAlex soa:hasParentInstitution).
    slot_uri: soa:hasParentInstitution
  child_institutions:
    multivalued: true
    range: Institution
    description: >-
      Child/subsidiary institutions
      (SemOpenAlex soa:hasChildInstitution).
    slot_uri: soa:hasChildInstitution
  acronym:
    description: >-
      Institution acronym (SemOpenAlex dbpedia:acronym).

  # ===========================================================================
  # NCATS TRANSLATOR SLOTS
  # ===========================================================================

  infores:
    description: >-
      Biolink Information Resource identifier (infores CURIE).
      Registered at https://biolink.github.io/infores/.
      Identifies the Knowledge Provider that produced this edge or
      entity (e.g., infores:pubmedkg, infores:drugbank,
      infores:cytognosis-scholarly-kg).
    slot_uri: biolink:provided_by
  knowledge_level:
    range: KnowledgeLevel
    description: >-
      How confidently an edge/association is asserted. Required for
      NCATS Translator TRAPI compliance on every edge.
    slot_uri: biolink:knowledge_level
  agent_type:
    range: AgentType
    description: >-
      How an edge/association was produced (manual curation, automated
      pipeline, text mining, etc.). Required for TRAPI compliance.
    slot_uri: biolink:agent_type
  translator_canonical_id:
    range: uriorcurie
    description: >-
      NCATS NodeNormalization canonical CURIE for this entity. The
      preferred identifier as returned by the NodeNormalization service
      (e.g., NCBIGene:7157 for TP53, MONDO:0005148 for T2DM).
  translator_equivalent_ids:
    multivalued: true
    range: uriorcurie
    description: >-
      All equivalent CURIEs as returned by NodeNormalization service.
      Enables federated queries across Translator KPs that may use
      different identifier schemes for the same concept.
  # Translator qualifier slots (for BioEntityAssociation edges)
  qualified_predicate:
    description: >-
      Refined predicate for Translator qualifier system (e.g.,
      biolink:causes when the base predicate is biolink:affects).
  subject_aspect_qualifier:
    range: TranslatorQualifierAspect
    description: >-
      What aspect of the subject entity the predicate acts on
      (e.g., expression, activity, abundance).
  object_aspect_qualifier:
    range: TranslatorQualifierAspect
    description: >-
      What aspect of the object entity the predicate acts on.
  subject_direction_qualifier:
    range: TranslatorDirectionQualifier
    description: >-
      Direction of change in the subject (e.g., increased, decreased).
  object_direction_qualifier:
    range: TranslatorDirectionQualifier
    description: >-
      Direction of change in the object (e.g., upregulated, downregulated).
  anatomical_context_qualifier:
    description: >-
      UBERON CURIE for the anatomical site context of an association
      (e.g., UBERON:0002107 for liver).
    range: uriorcurie
  species_context_qualifier:
    description: >-
      NCBITaxon CURIE for the species context of an association
      (e.g., NCBITaxon:9606 for human).
    range: uriorcurie
  temporal_context_qualifier:
    description: >-
      Temporal context of an association (date range, developmental
      stage ontology term, or time-point description).
