id: https://schema.cytognosis.org/scholarly-kg/code
name: cytognosis_code
title: Cytognosis Scholarly KG - Code Repository Schema
description: >-
  LinkML schema for code repositories. Aligned with CodeMeta, CITATION.cff,
  Software Heritage, and RO-Crate. Captures repository metadata, contributors,
  dependencies, version control, testing, CI/CD, and community metrics.
version: 0.4.0
license: CC-BY-4.0

prefixes:
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  codemeta: https://codemeta.github.io/
  foaf: http://xmlns.com/foaf/0.1/
  swh: https://www.softwareheritage.org/schema/
  prov: http://www.w3.org/ns/prov#
  pav: http://purl.org/pav/
  datacite: https://schema.datacite.org/
  biolink: https://w3id.org/biolink/vocab/
  DOI: https://doi.org/
  ROR: https://ror.org/
  cytognosis: https://schema.cytognosis.org/scholarly-kg/

default_prefix: cytognosis
default_range: string
imports:
  - linkml:types


# =============================================================================
# CLASSES
# =============================================================================
classes:

  # ===========================================================================
  # MIXINS
  # ===========================================================================

  HasTimestamps:
    mixin: true
    slots:
      - created_date
      - updated_date

  HasTopics:
    mixin: true
    slots:
      - topics
      - keywords

  HasLicense:
    mixin: true
    slots:
      - license_ref
      - license_spdx_id
      - license_text

  HasProvenance:
    mixin: true
    description: W3C PROV-aligned provenance tracking.
    class_uri: prov:Entity
    slots:
      - data_source
      - confidence_score
      - extraction_method
      - was_derived_from
      - was_generated_by
      - was_attributed_to

  HasROCrateMetadata:
    mixin: true
    description: RO-Crate metadata for packaging in Research Object Crates.
    slots:
      - conforms_to
      - sd_publisher
      - sd_date_published
      - credit_text
      - cite_as


  # ===========================================================================
  # ABSTRACT BASE CLASSES
  # ===========================================================================

  NamedThing:
    description: A generic groupable object with an identifier and name.
    slots:
      - id
      - display_name
      - description
      - alternate_names
      - xref

  ScholarlyEntity:
    is_a: NamedThing
    description: Base class for scholarly/research entities.
    slots:
      - id
      - display_name
      - description
      - alternate_names
      - xref


  # ===========================================================================
  # CODE REPOSITORY
  # ===========================================================================

  CodeRepository:
    is_a: ScholarlyEntity
    class_uri: codemeta:SoftwareSourceCode
    mixins: [HasTopics, HasLicense, HasProvenance, HasROCrateMetadata]
    description: >-
      Code repository linked to publications. Schema aligned with CodeMeta,
      CITATION.cff, Software Heritage, and RO-Crate. Captures repository
      metadata, version control, testing infrastructure, community metrics.
    slots:
      - id
      - display_name
      - description
      - repository_url
      - github_url
      - swh_id
      - contributors
      - maintainers
      - programming_languages
      - software_version
      - software_requirements
      - operating_systems
      - runtime_platform
      - build_instructions
      - dependency_list
      - development_status
      - continuous_integration_url
      - test_framework
      - code_coverage_percent
      - stars_count
      - forks_count
      - download_count
      - fork_of
      - is_part_of
      - associated_papers
      - associated_datasets
      - associated_models
      - date_published
      - date_modified
      - issn
      - reference_publication
      - readme_url
      - issue_tracker_url
      - documentation_url
      - topics
      - keywords
      - license_ref
      - license_spdx_id
      - license_text
      - data_source
      - confidence_score
      - extraction_method
      - was_derived_from
      - was_generated_by
      - was_attributed_to
      - conforms_to
      - sd_publisher
      - sd_date_published
      - credit_text
      - cite_as


# =============================================================================
# SLOTS
# =============================================================================
slots:

  # ---- Identity ------------------------------------------------------------
  id:
    slot_uri: schema:identifier
    range: uriorcurie
    identifier: true
  display_name:
    slot_uri: schema:name
  description:
    slot_uri: dcterms:description
  alternate_names:
    slot_uri: schema:alternateName
    multivalued: true
  xref:
    multivalued: true
    description: Cross-references to external databases (CURIEs).

  # ---- Timestamps ----------------------------------------------------------
  created_date:
    slot_uri: dcterms:created
    range: datetime
  updated_date:
    slot_uri: dcterms:modified
    range: datetime
  date_published:
    slot_uri: schema:datePublished
    range: date
  date_modified:
    slot_uri: schema:dateModified
    range: date

  # ---- License slots -------------------------------------------------------
  license_ref:
    range: string
  license_spdx_id: {}
  license_text: {}

  # ---- Topics and keywords -------------------------------------------------
  topics:
    multivalued: true
  keywords:
    multivalued: true
    slot_uri: schema:keywords

  # ---- Provenance ----------------------------------------------------------
  data_source: {}
  confidence_score:
    range: float
  extraction_method: {}
  was_derived_from:
    slot_uri: prov:wasDerivedFrom
    range: uriorcurie
  was_generated_by:
    slot_uri: prov:wasGeneratedBy
  was_attributed_to:
    slot_uri: prov:wasAttributedTo

  # ---- RO-Crate metadata ---------------------------------------------------
  conforms_to: {}
  sd_publisher: {}
  sd_date_published:
    slot_uri: schema:sdDatePublished
    range: date
  credit_text: {}
  cite_as: {}

  # ---- Repository URLs and IDs -------------------------------------------
  repository_url:
    range: uri
  github_url:
    range: uri
  swh_id:
    description: Software Heritage intrinsic identifier (SWHID).
  issn:
    slot_uri: http://purl.org/ontology/bibo/issn

  # ---- Core Repository Metadata ------------------------------------------
  software_version:
    slot_uri: schema:softwareVersion
  development_status:
    slot_uri: codemeta:developmentStatus

  # ---- Technical Details --------------------------------------------------
  programming_languages:
    multivalued: true
    slot_uri: codemeta:programmingLanguage
  software_requirements:
    multivalued: true
    slot_uri: schema:softwareRequirements
  operating_systems:
    multivalued: true
    slot_uri: schema:operatingSystem
  runtime_platform:
    slot_uri: schema:runtimePlatform
  build_instructions: {}
  dependency_list:
    multivalued: true

  # ---- Quality and Testing ------------------------------------------------
  test_framework: {}
  code_coverage_percent:
    range: float
  continuous_integration_url:
    range: uri
    slot_uri: codemeta:contIntegration

  # ---- Documentation and Support ------------------------------------------
  readme_url:
    range: uri
    slot_uri: codemeta:readme
  documentation_url:
    range: uri
  issue_tracker_url:
    range: uri
    slot_uri: codemeta:issueTracker

  # ---- Community Metrics --------------------------------------------------
  stars_count:
    range: integer
  forks_count:
    range: integer
  download_count:
    range: integer

  # ---- Repository Relationships -------------------------------------------
  fork_of:
    range: string
  is_part_of:
    range: string

  # ---- Related Artifacts --------------------------------------------------
  associated_papers:
    multivalued: true
  associated_datasets:
    multivalued: true
  associated_models:
    multivalued: true
  reference_publication:
    range: string

  # ---- Contributors -------------------------------------------------------
  contributors:
    multivalued: true
  maintainers:
    multivalued: true
