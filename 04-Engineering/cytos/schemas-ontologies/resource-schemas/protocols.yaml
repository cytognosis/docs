id: https://schema.cytognosis.org/scholarly-kg/protocols
name: cytognosis_protocols
title: Cytognosis Scholarly KG - Research Protocols Schema
description: >-
  LinkML schema for research protocols. Captures experimental, computational,
  clinical, and data collection protocols with step-by-step instructions,
  reagents, instruments, and integration with research artifacts. Aligned with
  Schema.org and scientific protocol standards.
version: 0.4.0
license: CC-BY-4.0

prefixes:
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  dcterms: http://purl.org/dc/terms/
  foaf: http://xmlns.com/foaf/0.1/
  prov: http://www.w3.org/ns/prov#
  pav: http://purl.org/pav/
  datacite: https://schema.datacite.org/
  biolink: https://w3id.org/biolink/vocab/
  DOI: https://doi.org/
  ROR: https://ror.org/
  cytognosis: https://schema.cytognosis.org/scholarly-kg/

default_prefix: cytognosis
default_range: string
imports:
  - linkml:types


# =============================================================================
# ENUMERATIONS
# =============================================================================
enums:

  ProtocolType:
    description: Category or type of research protocol.
    permissible_values:
      experimental:
        description: Wet-lab experimental protocol with step-by-step instructions.
      computational:
        description: Computational analysis protocol or bioinformatics pipeline.
      clinical:
        description: Clinical trial, study protocol, or patient care protocol.
      data_collection:
        description: Data acquisition or collection protocol.
      sample_preparation:
        description: Sample preparation, extraction, or processing protocol.
      imaging:
        description: Microscopy, imaging, or visualization protocol.
      sequencing:
        description: Sequencing library preparation or protocol.
      other:
        description: Other type of research protocol.


# =============================================================================
# CLASSES
# =============================================================================
classes:

  # ===========================================================================
  # MIXINS
  # ===========================================================================

  HasTimestamps:
    mixin: true
    slots:
      - created_date
      - updated_date

  HasTopics:
    mixin: true
    slots:
      - topics
      - keywords

  HasLicense:
    mixin: true
    slots:
      - license_ref
      - license_spdx_id
      - license_text

  HasProvenance:
    mixin: true
    description: W3C PROV-aligned provenance tracking.
    class_uri: prov:Entity
    slots:
      - data_source
      - confidence_score
      - extraction_method
      - was_derived_from
      - was_generated_by
      - was_attributed_to


  # ===========================================================================
  # ABSTRACT BASE CLASSES
  # ===========================================================================

  NamedThing:
    description: A generic groupable object with an identifier and name.
    slots:
      - id
      - display_name
      - description
      - alternate_names
      - xref

  ScholarlyEntity:
    is_a: NamedThing
    description: Base class for scholarly/research entities.
    slots:
      - id
      - display_name
      - description
      - alternate_names
      - xref


  # ===========================================================================
  # RESEARCH PROTOCOL
  # ===========================================================================

  Protocol:
    is_a: ScholarlyEntity
    class_uri: schema:CreativeWork
    mixins: [HasLicense, HasProvenance]
    description: >-
      Research protocol describing procedures, methods, or workflows for
      conducting experiments, analyses, clinical studies, or data collection.
      Captures protocol type, steps, required materials, estimated duration,
      and associations with research artifacts.
    slots:
      - id
      - display_name
      - description
      - protocol_type
      - protocol_url
      - protocol_version
      - protocol_steps
      - reagents_used
      - instruments_used
      - estimated_duration
      - associated_papers
      - associated_datasets
      - contributors
      - date_published
      - date_modified
      - license_ref
      - license_spdx_id
      - license_text
      - data_source
      - confidence_score
      - extraction_method
      - was_derived_from
      - was_generated_by
      - was_attributed_to


# =============================================================================
# SLOTS
# =============================================================================
slots:

  # ---- Identity ------------------------------------------------------------
  id:
    slot_uri: schema:identifier
    range: uriorcurie
    identifier: true
  display_name:
    slot_uri: schema:name
  description:
    slot_uri: dcterms:description
  alternate_names:
    slot_uri: schema:alternateName
    multivalued: true
  xref:
    multivalued: true
    description: Cross-references to external databases (CURIEs).

  # ---- Timestamps ----------------------------------------------------------
  created_date:
    slot_uri: dcterms:created
    range: datetime
  updated_date:
    slot_uri: dcterms:modified
    range: datetime
  date_published:
    slot_uri: schema:datePublished
    range: date
  date_modified:
    slot_uri: schema:dateModified
    range: date

  # ---- License slots -------------------------------------------------------
  license_ref:
    range: string
  license_spdx_id: {}
  license_text: {}

  # ---- Provenance ----------------------------------------------------------
  data_source: {}
  confidence_score:
    range: float
  extraction_method: {}
  was_derived_from:
    slot_uri: prov:wasDerivedFrom
    range: uriorcurie
  was_generated_by:
    slot_uri: prov:wasGeneratedBy
  was_attributed_to:
    slot_uri: prov:wasAttributedTo

  # ---- Protocol Metadata ---------------------------------------------------
  protocol_type:
    range: ProtocolType
    description: Category or type of the protocol.
  protocol_url:
    range: uri
    description: URL to the protocol document or online version.
  protocol_version:
    slot_uri: schema:softwareVersion
    description: Version identifier or number of the protocol.
  protocol_steps:
    multivalued: true
    description: Step-by-step procedure or method descriptions.

  # ---- Materials and Equipment -----------------------------------------------
  reagents_used:
    multivalued: true
    description: Chemical reagents, biological reagents, or materials used in protocol.
  instruments_used:
    multivalued: true
    description: Instruments, equipment, or devices used in protocol.

  # ---- Practical Information -----------------------------------------------
  estimated_duration:
    description: Estimated time required to complete the protocol (e.g., "2 hours", "3 days").

  # ---- Related Artifacts ---------------------------------------------------
  associated_papers:
    multivalued: true
    description: Papers that describe, use, or reference this protocol.
  associated_datasets:
    multivalued: true
    description: Datasets generated by or associated with this protocol.
  contributors:
    multivalued: true
    description: Authors, developers, or contributors to the protocol.
