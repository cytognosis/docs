# =============================================================================
# CLASSES
# =============================================================================
classes:

  # ===========================================================================
  # MIXINS
  # ===========================================================================

  HasTimestamps:
    mixin: true
    slots:
      - created_date
      - updated_date

  HasMetrics:
    mixin: true
    description: Scholarly impact metrics (OpenAlex pattern).
    slots:
      - works_count
      - cited_by_count
      - h_index
      - i10_index
      - counts_by_year

  HasExternalIds:
    mixin: true
    slots:
      - doi
      - pmid
      - pmcid
      - arxiv_id
      - ssrn_id
      - openalex_id
      - wikidata_id
      - crossref_id
      - scopus_id

  HasImages:
    mixin: true
    slots:
      - image_url
      - image_thumbnail_url

  HasTopics:
    mixin: true
    slots:
      - topics
      - keywords

  HasGeo:
    mixin: true
    slots:
      - geo

  HasProvenance:
    mixin: true
    description: W3C PROV-aligned provenance tracking.
    class_uri: prov:Entity
    slots:
      - data_source
      - confidence_score
      - extraction_method
      - was_derived_from
      - was_generated_by
      - was_attributed_to

  HasLicense:
    mixin: true
    description: Anything that can be licensed.
    slots:
      - license_ref
      - license_spdx_id
      - license_text

  HasCytognosisLinks:
    mixin: true
    description: >-
      Cytognosis-specific links to internal artifacts. Maps to Zotero Extra
      field key-value pairs.
    slots:
      - drive_pdf_url
      - code_original_url
      - code_internal_url
      - dataset_original_url
      - dataset_internal_url
      - model_original_url
      - model_internal_url

  HasUMLS:
    mixin: true
    description: >-
      UMLS Metathesaurus integration. CUI is the universal cross-reference
      hub for biomedical entities.
    slots:
      - cui
      - umls_semantic_types
      - umls_semantic_group
      - umls_preferred_term
      - umls_source_vocabs

  HasSemOpenAlex:
    mixin: true
    description: SemOpenAlex RDF Knowledge Graph compatibility.
    slots:
      - semopenalex_uri
      - mag_id
      - indexed_in

  HasTranslatorCompat:
    mixin: true
    description: NCATS Biomedical Data Translator compatibility.
    slots:
      - infores
