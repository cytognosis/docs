      - parameter_type
      - parameter_format
      - default_value
      - value_required
      - value_pattern
      - additional_type

  Instrument:
    is_a: NamedThing
    class_uri: schema:Thing
    mixins: [HasTimestamps]
    description: >-
      A physical or virtual instrument used in research (RO-Crate contextual
