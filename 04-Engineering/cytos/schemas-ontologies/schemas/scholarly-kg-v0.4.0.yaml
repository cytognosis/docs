  # ===========================================================================
  # v0.4.0 NEW: ARTIFACT RELATIONSHIP EDGES
  # ===========================================================================

  ArtifactRelationship:
    abstract: true
    is_a: NamedThing
    mixins: [HasTimestamps, HasProvenance]
    description: >-
      Abstract base for typed, evidence-backed relationships between
      research artifacts (papers, code, models, datasets). Each concrete
      subclass uses ontology-standardized predicates from CiTO, PROV-O,
      Schema.org, PAV, and DCAT.
    slots:
      - relationship_source
      - relationship_target
      - relationship_predicate
      - evidence_text
      - evidence_url
      - is_primary

  PaperCodeRelationship:
    is_a: ArtifactRelationship
    description: >-
      Typed relationship between a BibliographicResource (paper) and a
      CodeRepository. Predicate from PaperCodeRelationType enum.
    slots:
      - paper_ref
      - code_ref
      - paper_code_relation_type
    slot_usage:
      paper_ref: { required: true }
      code_ref: { required: true }
      paper_code_relation_type: { required: true }

  PaperModelRelationship:
    is_a: ArtifactRelationship
    description: >-
      Typed relationship between a BibliographicResource (paper) and an
      MLModel. Predicate from PaperModelRelationType enum.
    slots:
      - paper_ref
      - model_ref
      - paper_model_relation_type
    slot_usage:
      paper_ref: { required: true }
      model_ref: { required: true }
      paper_model_relation_type: { required: true }

  PaperDatasetRelationship:
    is_a: ArtifactRelationship
    description: >-
      Typed relationship between a BibliographicResource (paper) and a
      Dataset. Predicate from PaperDatasetRelationType enum.
    slots:
      - paper_ref
      - dataset_relationship_ref
      - paper_dataset_relation_type
      - dataset_split_used
    slot_usage:
      paper_ref: { required: true }
      dataset_relationship_ref: { required: true }
      paper_dataset_relation_type: { required: true }


  # ===========================================================================
  # W3C WEB ANNOTATION
  # ===========================================================================

  Annotation:
    is_a: NamedThing
    class_uri: oa:Annotation
    mixins: [HasTimestamps]
    slots:
      - annotation_creator
      - motivation
      - annotation_body
      - annotation_target
      - generated_at
    slot_usage:
      annotation_target: { required: true }

  AnnotationBody:
    class_uri: oa:TextualBody
    slots: [body_value, body_format, body_language, body_purpose]

  AnnotationTarget:
    class_uri: oa:SpecificResource
    slots: [target_source_uri, target_selector, target_scope]

  AnnotationSelector:
    class_uri: oa:Selector
    slots: [selector_type, selector_value, start_offset, end_offset]


  # ===========================================================================
  # EMBEDDED / ASSOCIATION CLASSES
  # ===========================================================================

  Authorship:
    description: Author-Work association with position and affiliation.
    slots:
      - person_ref
      - author_position
      - is_corresponding
      - institution_refs
      - raw_affiliation_string

  Location:
    description: Where a work is hosted (OpenAlex Location).
    slots:
      - landing_page_url
      - pdf_url
      - location_source
      - work_version
      - location_license
      - is_oa

  OpenAccessInfo:
    slots: [is_oa, oa_status, oa_url]

  GeoLocation:
    class_uri: schema:Place
    slots: [city, region, country_code, country_name, continent, latitude, longitude, geonames_city_id]

  APCPrice:
    slots: [currency, price, price_usd]

  YearlyCount:
    slots: [count_year, count_works, count_citations]

  Affiliation:
    description: Author-institution association over years.
    slots: [institution_ref, affiliation_years]

  OrganizationRole:
    description: Institution can also act as funder or publisher.
    slots: [role_type, role_entity_id, role_works_count]

  ExternalDatabaseRef:
    description: Reference to an external database identifier.
    slots: [db_name, db_id, db_url]

  BenchmarkResult:
    description: Performance on a named benchmark or metric.
    slots:
      - benchmark_name
      - metric_name
      - metric_value
      - dataset_ref
      - split
      - verified

  DisaggregatedResult:
    description: Model performance broken down by group.
    slots: [group_name, group_value, metric_name, metric_value]

  RecordSet:
    description: Croissant ML RecordSet.
    class_uri: croissant:RecordSet
    slots: [record_set_name, record_set_description, fields]


