      - test_suite_url

  FormalParameter:
    is_a: NamedThing
    class_uri: bioschemas:FormalParameter
    description: >-
      Input or output parameter of a ComputationalWorkflow (Bioschemas
      FormalParameter). Captures name, type, format, and constraints.
    slots:
