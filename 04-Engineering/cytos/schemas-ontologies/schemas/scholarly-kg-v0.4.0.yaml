  # ===========================================================================
  # v0.4.0 NEW: RO-CRATE ENTITIES
  # ===========================================================================

  ResearchObject:
    is_a: ScholarlyEntity
    class_uri: schema:Dataset
    mixins: [HasLicense, HasProvenance, HasROCrateMetadata]
    description: >-
      A Research Object Crate (RO-Crate) packaging research artifacts with
      structured metadata. Aligns with the RO-Crate 1.2 specification where
      the root data entity is a schema:Dataset. A ResearchObject aggregates
      papers, code, datasets, models, workflows, protocols, presentations,
      and other artifacts into a single, self-describing package.
    slots:
      - ro_crate_profile
      - ro_crate_version
      - has_part_papers
      - has_part_code
      - has_part_datasets
      - has_part_models
      - has_part_workflows
      - has_part_protocols
      - has_part_presentations
      - has_part_instruments
      - has_part_other
      - main_entity
      - contributors
      - date_published
      - date_modified

  ComputationalWorkflow:
    is_a: ScholarlyEntity
    class_uri: bioschemas:ComputationalWorkflow
    mixins: [HasLicense, HasProvenance, HasROCrateMetadata]
    description: >-
      A computational workflow (Bioschemas ComputationalWorkflow). Aligned
      with Workflow RO-Crate profile. Captures executable pipelines in
      CWL, Nextflow, Snakemake, Galaxy, etc.
    slots:
      - workflow_language
      - workflow_status
      - workflow_version
      - workflow_url
      - workflow_repository_url
      - workflow_inputs
      - workflow_outputs
      - workflow_steps
      - software_requirements
