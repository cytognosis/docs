  # ===========================================================================
  # v0.4.0 NEW ENUMS: Artifact relationship types
  # ===========================================================================

  PaperCodeRelationType:
    description: >-
      Standardized relationship types between papers and code repositories.
      Predicates drawn from CiTO, PROV-O, Schema.org, and CodeMeta.
    permissible_values:
      implements:
        description: >-
          Paper describes algorithm/method that this code implements.
          The code is the executable realization of the paper's contribution.
        meaning: schema:isBasedOn
      supplements:
        description: >-
          Code is supplementary material of the paper (scripts, notebooks,
          analysis code distributed with the publication).
        meaning: schema:hasPart
      depends_on:
        description: >-
          Paper depends on or builds upon this existing code/library
          (e.g., uses PyTorch, extends an existing framework).
        meaning: prov:used
      extends:
        description: >-
          Paper extends, forks, or modifies existing code to create
          a derivative version with new functionality.
        meaning: pav:previousVersion
      documents:
        description: >-
          Paper serves as the reference publication for this software
          (CodeMeta referencePublication inverse).
        meaning: codemeta:referencePublication
      reproduces:
        description: >-
          Code is a reproduction or reimplementation of results/methods
          described in the paper by independent authors.
        meaning: cito:replicates

  PaperModelRelationType:
    description: >-
      Standardized relationship types between papers and ML models.
      Predicates drawn from CiTO, PROV-O, PAV.
    permissible_values:
      proposes:
        description: >-
          Paper introduces this model as a novel contribution.
          The model was first described and created by this paper.
        meaning: prov:wasGeneratedBy
      uses:
        description: >-
          Paper uses this existing model without modification
          (e.g., as a baseline, for inference, for comparison).
        meaning: prov:used
      fine_tunes:
        description: >-
          Paper fine-tunes or adapts this pre-trained model,
          producing a derived model for a specific task/domain.
        meaning: prov:wasDerivedFrom
      evaluates:
        description: >-
          Paper evaluates or benchmarks this model, reporting
          performance metrics without modifying the model itself.
        meaning: cito:citesAsAuthority
      distills:
        description: >-
          Paper applies knowledge distillation from this (teacher)
          model to produce a smaller or specialized (student) model.
        meaning: prov:wasDerivedFrom
      extends_architecture:
        description: >-
          Paper proposes architectural modifications to an existing
          model family (e.g., new attention mechanism on top of BERT).
        meaning: pav:previousVersion

  PaperDatasetRelationType:
    description: >-
      Standardized relationship types between papers and datasets.
      Predicates drawn from CiTO, PROV-O, DCAT, Croissant.
    permissible_values:
      creates:
        description: >-
          Paper introduces and describes this new dataset as a
          primary contribution. The dataset did not exist before.
        meaning: prov:wasGeneratedBy
      uses:
        description: >-
          Paper uses this existing dataset (general purpose, not
          further specified as training/test/validation).
        meaning: cito:usesDataFrom
      uses_for_training:
        description: >-
          Paper uses this dataset specifically for model training
          in an ML context.
        meaning: cito:usesDataFrom
      uses_for_testing:
        description: >-
          Paper uses this dataset for testing/evaluation of a
          model or method (held-out test set).
        meaning: cito:citesAsDataSource
      uses_for_validation:
        description: >-
          Paper uses this dataset for validation/hyperparameter
          tuning (dev set, validation split).
        meaning: cito:usesDataFrom
      uses_as_benchmark:
        description: >-
          Paper uses this dataset as a standard benchmark for
          comparing methods (e.g., ImageNet, GLUE, MMLU).
        meaning: cito:citesAsAuthority
      augments:
        description: >-
          Paper augments or extends an existing dataset with
          additional annotations, samples, or modalities.
        meaning: prov:wasDerivedFrom
      curates:
        description: >-
          Paper curates, cleans, or re-annotates an existing
          dataset, producing a refined version.
        meaning: prov:wasDerivedFrom

