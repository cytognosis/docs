# =============================================================================
# Cytognosis Foundation -- Scholarly Knowledge Graph Schema v0.4.0
# =============================================================================
#
# Design goals (v0.3.0 goals 1-15 retained, plus):
#  16. RO-Crate alignment: ResearchObject, Workflow, Instrument, Protocol,
#      Presentation as first-class entities
#  17. First-class ArtifactRelationship edges with ontology-standardized
#      predicates (CiTO, PROV-O, Schema.org, PAV, DCAT) for typed
#      Paper<->Code, Paper<->Model, Paper<->Dataset interactions
#  18. New entity types from RO-Crate profiles: ComputationalWorkflow,
#      FormalParameter, Instrument, Protocol, Presentation
#
# New standards mapped in v0.4.0:
#   pav:        -- PAV (Provenance, Authoring, Versioning)
#   bioschemas: -- Bioschemas.org (ComputationalWorkflow, FormalParameter)
#   ro:         -- Research Object Ontology
#
# Version: 0.4.0
# License: CC-BY-4.0
# =============================================================================

id: https://schema.cytognosis.org/scholarly-kg
name: cytognosis_scholarly_kg
title: Cytognosis Scholarly Knowledge Graph Schema
description: >-
  Comprehensive LinkML schema unifying bibliographic metadata (BibTeX),
  scholarly entities (OpenAlex/SemOpenAlex), biomedical knowledge
  (Biolink/PubMedKG/UMLS), NCATS Translator compatibility, research
  artifacts (code, data, models, workflows, protocols), RO-Crate research
  objects, licenses, W3C Web Annotation, and first-class artifact
  relationship edges with ontology-standardized predicates.
version: 0.4.0
license: https://creativecommons.org/licenses/by/4.0/

prefixes:
  linkml: https://w3id.org/linkml/
