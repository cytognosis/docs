# Cytognosis asset ontology (machine-readable). Contract: ONTOLOGY.md. Validate: scripts/validate_ontology.py
# node: {id, type: root|surface|pillar|taxon|project|repo|asset-class, parents: [...], stores: optional path hint}
nodes:
  - {id: org, type: root, parents: []}
  # surfaces
  - {id: docs-repo, type: surface, parents: [org, code-repos], stores: ~/repos/cytognosis/docs}
  - {id: obsidian-vault, type: surface, parents: [org], stores: ~/Documents/ObsidianVault}
  - {id: claude-projects, type: surface, parents: [org], stores: ~/Claude/Projects}
  - {id: mission-board, type: surface, parents: [org], stores: http://127.0.0.1:40601}
  - {id: cytomem, type: surface, parents: [org], stores: neo4j + MCP}
  - {id: datasets-store, type: surface, parents: [org], stores: ~/datasets/cytognosis}
  - {id: code-repos, type: surface, parents: [org], stores: ~/repos/cytognosis}
  # pillars (mirrored: parents docs-repo AND obsidian-vault)
  - {id: 00-inbox, type: pillar, parents: [docs-repo, obsidian-vault]}
  - {id: 01-strategy, type: pillar, parents: [docs-repo, obsidian-vault]}
  - {id: 02-funding, type: pillar, parents: [docs-repo, obsidian-vault]}
  - {id: 03-products, type: pillar, parents: [docs-repo, obsidian-vault]}
  - {id: 04-engineering, type: pillar, parents: [docs-repo, obsidian-vault]}
  - {id: 05-research, type: pillar, parents: [docs-repo, obsidian-vault]}
  - {id: 06-operations, type: pillar, parents: [docs-repo, obsidian-vault]}
  - {id: 07-design, type: pillar, parents: [docs-repo, obsidian-vault]}
  # product taxonomy (describes; storage only inside 03/05 subtrees)
  - {id: product-taxonomy, type: taxon, parents: [org]}
  - {id: cytoverse, type: taxon, parents: [product-taxonomy]}
  - {id: cytoscope, type: taxon, parents: [product-taxonomy]}
  - {id: cytonome, type: taxon, parents: [product-taxonomy]}
  - {id: cytoplex-product, type: taxon, parents: [cytonome, 03-products]}
  - {id: yar-product, type: taxon, parents: [cytonome, 03-products]}
  # projects (slice_of pillars via extra parents)
  - {id: grants-project, type: project, parents: [claude-projects, 02-funding, 01-strategy]}
  - {id: science-platform-project, type: project, parents: [claude-projects, 05-research, 03-products]}
  - {id: design-project, type: project, parents: [claude-projects, 07-design]}
  - {id: website-project, type: project, parents: [claude-projects, 03-products, 07-design]}
  - {id: yar-project, type: project, parents: [claude-projects, yar-product, 04-engineering]}
  - {id: cytos-project, type: project, parents: [claude-projects, 04-engineering]}
  - {id: infra-project, type: project, parents: [claude-projects, 04-engineering]}
  - {id: operations-project, type: project, parents: [claude-projects, 06-operations]}
  - {id: cytognosis-project, type: project, parents: [claude-projects, 01-strategy]}
  - {id: refactor-project, type: project, parents: [claude-projects, 04-engineering]}
  - {id: personal-project, type: project, parents: [claude-projects]}
  - {id: strategic-planning-stub, type: project, parents: [claude-projects, 01-strategy]}
  # repos
  - {id: website-repo, type: repo, parents: [code-repos]}
  - {id: branding-repo, type: repo, parents: [code-repos]}
  - {id: cytomem-repo, type: repo, parents: [code-repos]}
  - {id: cytos-repo, type: repo, parents: [code-repos]}
  - {id: cytoplex-repo, type: repo, parents: [code-repos]}
  - {id: yar-repo, type: repo, parents: [code-repos]}
  - {id: cytoskills-repo, type: repo, parents: [code-repos]}
  - {id: infrastructure-repo, type: repo, parents: [code-repos]}
  - {id: cytoskeleton-repo, type: repo, parents: [code-repos]}
  - {id: cytocast-repo, type: repo, parents: [code-repos]}
  - {id: tools-repo, type: repo, parents: [code-repos]}
  - {id: org-repo, type: repo, parents: [code-repos]}
  - {id: neuro-pheno-repo, type: repo, parents: [code-repos]}
  - {id: vault-repo, type: repo, parents: [code-repos, obsidian-vault]}
  # abstract classes (groupings; concrete children carry the storage parents)
  - {id: document, type: class, parents: [org]}
  - {id: technical-doc, type: asset-class, parents: [document, docs-repo]}
  - {id: readable-twin, type: asset-class, parents: [document, obsidian-vault]}
  - {id: agent-prompt-doc, type: asset-class, parents: [document, docs-repo]}
  - {id: working-draft, type: asset-class, parents: [document, claude-projects]}
  - {id: plan-doc, type: asset-class, parents: [document, claude-projects]}
  - {id: master-drive-plan, type: asset-class, parents: [plan-doc, refactor-project]}
  - {id: status-doc, type: asset-class, parents: [document, refactor-project]}
  - {id: org-contract, type: asset-class, parents: [technical-doc]}
  - {id: product-what-doc, type: asset-class, parents: [technical-doc, 03-products]}
  - {id: repo-how-doc, type: asset-class, parents: [technical-doc, 04-engineering]}
  - {id: funding-submission, type: asset-class, parents: [technical-doc, 02-funding]}
  # asset classes: specs
  - {id: spec, type: asset-class, parents: [document, code-repos]}
  - {id: spec-delta, type: asset-class, parents: [spec]}
  - {id: verification-record, type: asset-class, parents: [spec]}
  - {id: spec-registry, type: asset-class, parents: [org-contract, 04-engineering]}
  # asset classes: steering
  - {id: steering, type: class, parents: [org]}
  - {id: agents-md, type: asset-class, parents: [steering, code-repos]}
  - {id: constitution, type: asset-class, parents: [steering, code-repos]}
  - {id: project-claude-md, type: asset-class, parents: [steering, claude-projects]}
  - {id: skill, type: asset-class, parents: [steering, cytoskills-repo]}
  # asset classes: code, design, data
  - {id: code, type: asset-class, parents: [code-repos]}
  - {id: design-knowledge, type: asset-class, parents: [technical-doc, 07-design]}
  - {id: design-tokens, type: asset-class, parents: [branding-repo]}
  - {id: brand-assets, type: asset-class, parents: [branding-repo]}
  - {id: website-template-artifact, type: asset-class, parents: [branding-repo]}
  - {id: design-sources, type: asset-class, parents: [datasets-store]}
  - {id: dataset, type: asset-class, parents: [datasets-store]}
  # asset classes: ops + memory + archive + personal
  - {id: board-card, type: asset-class, parents: [mission-board]}
  - {id: workspace-run, type: asset-class, parents: [mission-board]}
  - {id: memory-artifact, type: asset-class, parents: [cytomem]}
  - {id: memory-task, type: asset-class, parents: [cytomem]}
  - {id: archive-item, type: class, parents: [org]}
  - {id: safety-backup, type: asset-class, parents: [archive-item, refactor-project]}
  - {id: personal-asset, type: asset-class, parents: [personal-project]}
overlays:  # one-way flow annotations, not hierarchy; included in cycle check for safety
  - {from: technical-doc, to: readable-twin, type: paired_with}
  - {from: spec, to: spec-registry, type: registered_in}
  - {from: spec, to: board-card, type: carded_on}
  - {from: docs-repo, to: cytomem, type: ingested_by}
  - {from: claude-projects, to: cytomem, type: ingested_by}
  - {from: spec, to: cytomem, type: ingested_by}
  - {from: design-tokens, to: website-template-artifact, type: upstream_of}
  - {from: website-template-artifact, to: website-repo, type: upstream_of}
  - {from: mission-board, to: code, type: dispatches}
  - {from: product-what-doc, to: repo-how-doc, type: cross_linked}
